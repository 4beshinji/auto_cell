  {id:"src_nobar_2025",label:"Nobar et al. 2025 (arXiv)",type:"source",domain:"d4",content:"Guided multi-fidelity Bayesian optimization with learned correction model for digital twin controller tuning.",sources:[]},
  {id:"src_bioprocesstools_2026",label:"Bioprocesstools 2026: AI and ML for Bioprocess Optimization",type:"source",domain:"d4",content:"Industry survey of ML method data requirements for bioprocess optimization.",sources:[]},
  {id:"src_bioprocessintl_2026",label:"Bioprocess International 2026: Multifidelity Optimization in Biopharma",type:"source",domain:"d4",content:"Case study of multi-fidelity BO in mAb process with mechanistic simulator bias up to 15%.",sources:[]},
  {id:"src_yokogawa_pharma40",label:"Yokogawa: Building Intelligent processes for Pharma 4.0",type:"source",domain:"d8",content:"Yokogawa Insilico digital twin architecture: Reactor + Extracellular Reaction + Kinetic Cell models.",sources:[]},
  {id:"src_pharma_manufacturing_2022",label:"Pharma Manufacturing 2022: Pharma Innovation Awards",type:"source",domain:"d8",content:"Yokogawa Insilico Digital Twin Factory award and up to 50% experimental effort reduction claim.",sources:[]},
  {id:"raman_calibration_ipsc",label:"iPSC 浮遊凝集体 Raman 校正戦略",type:"concept",domain:"d7",content:"iPSC 浮遊/凝集体バイオリアクターにおける in-line Raman の再校正アプローチ。Nova FLEX2 を正解ラベル、capacitance を VCD anchor、凝集体画像を光散乱補正の共変量として用いる。CHO 由来モデルは転用不可。v1 では Nova 校正後のオプション、v2 以降の閉ループ入力昇格を目指す。〔推定：設計提案〕",sources:[]},
  {id:"raman_pls_model",label:"Raman PLS chemometric モデル",type:"concept",domain:"d4",content:"Raman スペクトルから glucose/lactate/glutamine 等を推定する部分最小二乗回帰モデル。前処理（ベースライン補正、Savitzky-Golay 微分、SNV/MSC）、変数選択、leave-one-batch-out 交差検証、外部検証を含む。iPSC では凝集体・高密度細胞による光散乱補正が必要。〔推定：CHO 事例を参考に iPSC 再解釈〕",sources:[]},
  {id:"raman_reference_nova",label:"Nova FLEX2 Raman 正解ラベル",type:"concept",domain:"d7",content:"Raman PLS モデルの校正に使用する at-line リファレンス計測。Nova BioProfile FLEX2 による glucose/lactate/glutamine/osmolality/viability/細胞径等の多パラメータ正解。ALCOA-lite でサンプル時刻・スペクトル ID・モデル version と紐付ける。〔事実：Nova FLEX2 は 16 項 at-line analyzer; 推定：Raman 校正用途〕",sources:[]},
  {id:"raman_cell_scattering",label:"Raman 細胞光散乱",type:"concept",domain:"d7",content:"懸濁細胞・凝集体による Mie 散乱により Raman 強度が減衰する現象。Beer-Lambert 則では記述できず、細胞密度との非線形関係が知られる。iPSC 凝集体（150–350 µm）は 785 nm レーザーに対して大きな散乱体となり、スペクトルベースラインと強度に影響を与える。〔事実：Yang 2024 J Biotechnol 396:41-52 DOI:10.1016/j.jbiotec.2024.10.007; 推定：iPSC 凝集体への適用〕",sources:[]},
  {id:"raman_aggregate_interference",label:"Raman 凝集体干渉",type:"concept",domain:"d7",content:"凝集体径・密度の増大が Raman プローブの光路長と散乱断面積を変化させ、代謝物推定精度を低下させる要因。凝集体径は培養日数とともに増大し（95 µm → 530 µm）、多能性維持のため 400 µm 以下が推奨される。〔事実：Eppendorf AN485; StemCell mTeSR 3D manual; 推定：Raman 干渉〕",sources:[]},
  {id:"raman_cho_to_ipsc_transfer",label:"CHO→iPSC Raman モデル転移制限",type:"concept",domain:"d4",content:"CHO/mAb 由来の chemometric モデルを iPSC 浮遊凝集体に直接転用できない制約。培地マトリックス、代謝プロファイル、細胞サイズ/凝集体構造、品質指標が異なる。クローン間・スケール間転移すら補正を要する事例が報告されている。〔推定：Pétillot 2020 DOI:10.1002/eng2.12230; Machleidt 2024 DOI:10.1002/biot.202300289; Rowland-Jones 2021 DOI:10.1002/btpr.3074〕",sources:[]},
  {id:"raman_model_lifecycle",label:"Raman モデルライフサイクル管理",type:"concept",domain:"d6",content:"Raman PLS モデルの version 管理、再校正トリガ（培地ロット変更、細胞株変更、プローブ交換、スケール変更）、性能モニタリング、監査証跡を含む技術的統制。ALCOA-lite・GAMP5 AI/ML Appendix D11 に準じた扱い。〔推定：GAMP5 2nd Ed D11; FDA data integrity guidance〕",sources:[]},
  {id:"raman_confidence_score",label:"Raman 推定信頼度スコア",type:"concept",domain:"d4",content:"Raman PLS モデルの予測不確実性を定量化するスコア（Q 残差、Hotelling T²、予測分散、校正範囲外判定）。低信頼度時は Human-on-the-loop 承認へエスカレーションし、Nova FLEX2 値を優先する。〔推定：設計提案〕",sources:[]},
  {id:"src_abu_absi_2011",label:"Abu-Absi et al. 2011 in-line Raman CHO",type:"source",domain:"d7",content:"Real time monitoring of multiple parameters in mammalian cell culture bioreactors using an in-line Raman spectroscopy probe. Biotechnol Bioeng 108(5):1215-1221. CHO fed-batch で glucose/lactate/glutamine/glutamate/ammonium/VCD/TCD の同時 in-line 予測を実証。DOI:10.1002/bit.23023",sources:[]},
  {id:"src_matthews_2016",label:"Matthews et al. 2016 Raman 乳酸閉ループ制御",type:"source",domain:"d7",content:"Closed loop control of lactate concentration in mammalian cell culture by Raman spectroscopy leads to improved cell density, viability, and biopharmaceutical protein production. Biotechnol Bioeng 113(11):2416-2424. Raman PLS ベースの乳酸閉ループ制御で培養期間延長・収量向上。DOI:10.1002/bit.26018",sources:[]},
  {id:"src_berry_2015",label:"Berry et al. 2015 cross-scale Raman CHO",type:"source",domain:"d7",content:"Cross-scale predictive modeling of CHO cell culture growth and metabolites using Raman spectroscopy and multivariate analysis. Biotechnol Prog 31(2):566-577. Raman モデルのスケール横断予測。DOI:10.1002/btpr.2035",sources:[]},
  {id:"src_yan_2024",label:"Yan et al. 2024 Raman バッチ数影響",type:"source",domain:"d7",content:"Development of an in-line Raman analytical method for commercial-scale CHO cell culture process monitoring: influence of measurement channels and batch number on model performance. Biotechnol J 19(1):2300395. 商業規模 CHO での in-line Raman 法開発。チャネル数とバッチ数がモデル性能に与える影響を評価。DOI:10.1002/biot.202300395",sources:[]},
  {id:"src_costa_2024",label:"Costa et al. 2024 Raman cell therapy review",type:"source",domain:"d7",content:"Harnessing Raman spectroscopy for cell therapy bioprocessing. Biotechnol Adv 2024. Cell therapy 製造における Raman の包括レビュー。細胞密度、生存率、代謝物、細胞同一性バイオマーカーの同時計測可能性を議論。DOI:10.1016/j.biotechadv.2024.108166",sources:[]},
  {id:"src_yang_2024_raman",label:"Yang et al. 2024 Raman 細胞散乱補正",type:"source",domain:"d7",content:"In-line monitoring of bioreactor by Raman spectroscopy: direct use of a standard-based model through cell-scattering correction. J Biotechnol 396:41-52 (2024). 酵母培養において細胞散乱による Raman 強度減衰を非線形式で補正し、標準液ベース PLS モデルを直接使用。DOI:10.1016/j.jbiotec.2024.10.007",sources:[]},
  {id:"src_petillot_2020",label:"Pétillot et al. 2020 Raman calibration transfer",type:"source",domain:"d7",content:"Calibration transfer for bioprocess Raman monitoring using Kennard-Stone piecewise direct standardization and multivariate algorithms. Eng Rep 2(11):e12230. バイオプロセス Raman モデルのキャリブレーション転移の困難性と補正手法。DOI:10.1002/eng2.12230",sources:[]},
  {id:"src_machleidt_2024",label:"Machleidt et al. 2024 cross-clone Raman CHO",type:"source",domain:"d7",content:"Feasibility and performance of cross-clone Raman calibration models in CHO cultivation. Biotechnol J 19(1):2300289. CHO クローン間でも Raman 校正モデルの性能が制限されることを示唆。DOI:10.1002/biot.202300289",sources:[]},
  {id:"src_rowland_jones_2021",label:"Rowland-Jones et al. 2021 Raman scale transfer",type:"source",domain:"d7",content:"Spectroscopy integration to miniature bioreactors and large scale production bioreactors—increasing current capabilities and model transfer. Biotechnol Prog 37(1):e3074. ミニバイオリアクタから大規模槽への Raman モデル転移の課題。DOI:10.1002/btpr.3074",sources:[]},
  {id:"src_bioprocesstools_raman",label:"Bioprocess Tools Raman monitoring guide",type:"source",domain:"d7",content:"How to Use Raman Spectroscopy for Real-Time Bioprocess Monitoring. PLS モデル構築ワークフロー、前処理、5–15 バッチ校正、性能指標（RMSEP/R²/bias）の実務ガイド。URL:https://bioprocesstools.com/blog/raman-spectroscopy-bioprocess-monitoring/",sources:[]},
  {id:"src_metrohm_an_pan_1065",label:"Metrohm 2060 Raman cell culture AN-PAN-1065",type:"source",domain:"d7",content:"Inline monitoring of cell cultures with Raman spectroscopy. Metrohm 2060 Raman Analyzer による細胞培養 glucose/lactate in-line 計測アプリケーションノート。SEP glucose 0.20 g/L、lactate 0.12 g/L。URL:https://www.metrohm.com/en/applications/application-notes/prozess-applikationen-anpan/an-pan-1065.html",sources:[]},
  {id:"src_repligen_maverick",label:"Repligen MAVERICK Raman PAT",type:"source",domain:"d8",content:"Instant Implementation of Raman-Based PAT With MAVERICK System for Monitoring Glucose and Lactate. de novo モデルによる glucose/lactate/biomass 計測。複数哺乳類培地で線形性・選択性を検証。URL:https://www.repligen.com/Products/analytics/maverick/Resources/DOC043_1.PDF",sources:[]},
  {id:"src_yokogawa_2023",label:"Yokogawa Raman calibration model without culture data",type:"source",domain:"d8",content:"Yokogawa Electric / Kwansei Gakuin University. Development of Raman calibration model without culture data for in-line cell culture monitoring. glucose RMSEP 0.23 g/L、lactate 0.29 g/L、antibody 0.20 g/L を報告。原論文確認中。URL:https://www.spectroscopyonline.com/view/using-a-new-raman-method-for-real-time-inline-cell-culture-monitoring",sources:[]},
  {id:"add_cho_ipsc_cho_metabolism",label:"CHO 代謝プロファイル",type:"concept",domain:"d1",content:"ハムスター卵巢由来 CHO 細胞の代謝特性。高グルコース消費、活発な乳酸産生、グルタミン分解によるアンモニア蓄積、mAb タイトル最大化が最適化目標。iPSC にはそのまま転用不可。",sources:[]},
  {id:"add_cho_ipsc_ipsc_metabolism",label:"iPSC 代謝プロファイル",type:"concept",domain:"d1",content:"ヒト多能性幹細胞 iPSC の代謝特性。highly glycolytic で高密度化に伴いグルコース消費と乳酸分泌が急増。乳酸蓄積・浸透圧ピーク・凝集体サイズが成長制限因子。多能性維持が品質目標。",sources:[]},
  {id:"add_cho_ipsc_glycolytic_shift",label:"iPSC の高解糖性シフト",type:"concept",domain:"d1",content:"iPSC が未分化状態で解糖系を優位に使う代謝特性。高密度培養ではグルコース供給と乳酸洗浄のトレードオフが顕在化し、灌流制御の中核となる。",sources:[]},
  {id:"add_cho_ipsc_lactate_threshold",label:"乳酸閾値の細胞種差",type:"concept",domain:"d7",content:"CHO では株により 15–50 mM の阻害閾値が報告される。iPSC では Manstein 2021 のモデル値 K_Lac=50 mM が用いられるが、実際の iPSC 株・培地で再校正が必要。CHO 値をそのまま転用しない。",sources:[]},
  {id:"add_cho_ipsc_ammonia_threshold",label:"アンモニア閾値の未確定性",type:"concept",domain:"d7",content:"CHO では 5 mM で成長阻害が報告されるが、iPSC のネイティブ閾値は未確定。auto_cell A 層では監視値として扱い、実データまたは文献調査で再校正。",sources:[]},
  {id:"add_cho_ipsc_osmolality_threshold",label:"浸透圧閾値の細胞種差",type:"concept",domain:"d7",content:"CHO/哺乳類培養では 380–450 mOsm/kg 超で成長低下が報告される。iPSC では Manstein 2021 が K_Osm=500 mOsm/kg を採用。培地・密度依存で再校正要。",sources:[]},
  {id:"add_cho_ipsc_glucose_threshold",label:"グルコース閾値の細胞種差",type:"concept",domain:"d7",content:"CHO では 2–3 g/L（11–17 mM）維持が推奨される。iPSC では Manstein 2021 が K_Glc=1.5 mM を採用。iPSC は低グルコースで飢餓制限を受けやすい。",sources:[]},
  {id:"add_cho_ipsc_aggregate_oxygen_diffusion",label:"凝集体内酸素拡散限界",type:"concept",domain:"d1",content:"iPSC 凝集体では径が大きくなると中心部への酸素/栄養拡散が制限され壊死コアが形成。100–200 µm の拡散距離、300 µm 以下の径制御が目安。",sources:[]},
  {id:"add_cho_ipsc_aggregate_size_cpp",label:"凝集体サイズを CPP として扱う",type:"concept",domain:"d4",content:"iPSC 浮遊培養では凝集体径が酸素拡散、シアストレス、未分化性維持を同時に規定する独立した CPP。平均径だけでなく大径凝集体割合も考慮。",sources:[]},
  {id:"add_cho_ipsc_shear_sensitivity",label:"iPSC のシア感受性",type:"concept",domain:"d4",content:"iPSC は攪拌によるシアストレスに敏感。Vertical-Wheel では 40–60 rpm が最適、DASbox では 80 rpm（150mL）が報告。反応器形状とスケールで再設定必要。",sources:[]},
  {id:"add_cho_ipsc_mab_titer_objective",label:"CHO の mAb タイトル目的関数",type:"concept",domain:"d4",content:"CHO fed-batch/perfusion の最適化目標。抗体タイトル（g/L）、viable cell density × specific productivity、糖鎖パターン（CQA）。iPSC 目的関数とは本質的に異なる。",sources:[]},
  {id:"add_cho_ipsc_pluripotency_objective",label:"iPSC の多能性品質目的関数",type:"concept",domain:"d4",content:"iPSC 浮遊拡大の最適化目標。細胞収量 × 生存率 × 多能性マーカー陽性率（OCT4/SOX2/NANOG/SSEA/TRA）× 凝集体適正サイズ。重みは細胞株・用途で変動。",sources:[]},
  {id:"add_cho_ipsc_qc_marker_panel",label:"iPSC 多能性 QC マーカーパネル",type:"concept",domain:"d1",content:"iPSC の未分化性を評価するマーカー群。核内転写因子 OCT4/SOX2/NANOG、細胞表面マーカー SSEA-3/SSEA-4/TRA-1-60/TRA-1-81、核型/同一性。offline/run 単位で測定。",sources:[]},
  {id:"add_cho_ipsc_transfer_caution",label:"CHO→iPSC 知見転用注意",type:"concept",domain:"d4",content:"CHO 由来の CPP 数値・制御戦略・目的関数を iPSC にそのまま転用しないこと。細胞種・培地・反応器形状・製品特性（mAb vs 細胞製品）の違いを再解釈。",sources:[]},
  {id:"add_cho_ipsc_cpp_reinterpretation",label:"CPP の iPSC 再解釈",type:"concept",domain:"d4",content:"CHO/mAb 中心の調査レポートから得られた知見を、iPSC 浮遊/凝集体灌流の文脈に再解釈する設計活動。L1 レシピ、L2 BO、L3 HMI に反映。",sources:[]},
  {id:"src_add_cho_ipsc_manstein2021",label:"Manstein & Zweigerdt 2021 hiPSC perfusion",type:"source",domain:"d1",content:"hPSC 灌流撹拌槽高密度培養。7 日で 35×10⁶ cells/mL、乳酸/浸透圧/グルコース制御、6 項 Monod モデル。",sources:[]},
  {id:"src_add_cho_ipsc_borys2021",label:"Borys et al. 2021 Vertical-Wheel hiPSC",type:"source",domain:"d4",content:"Vertical-Wheel 撹拌槽での hiPSC 凝集体拡大。40 rpm 最適、>400 µm で壊死リスク。",sources:[]},
  {id:"src_add_cho_ipsc_huang2020",label:"Huang et al. 2020 PSC 10L stirred tank manufacturing",type:"source",domain:"d1",content:"10 L 撹拌槽での PSC 製造プロセス開発。凝集体サイズ 300 µm 制限、酸素拡散限界 100–200 µm。",sources:[]},
  {id:"src_add_cho_ipsc_xing2008",label:"Xing et al. 2008 CHO metabolite inhibition thresholds",type:"source",domain:"d7",content:"CHO 培養における乳酸・アンモニア・浸透圧・pCO₂ の阻害閾値多変量解析。iPSC への直接転用不可。",sources:[]},
  {id:"src_add_cho_ipsc_toussaint2016",label:"Toussaint et al. 2016 CHO lactate metabolism engineering",type:"source",domain:"d1",content:"CHO の乳酸代謝改変（PYC2）による抗体タイトル向上。CHO 特異的戦略。",sources:[]},
  {id:"src_add_cho_ipsc_mabion2025",label:"Mabion 2025 CHO metabolite analysis guide",type:"source",domain:"d7",content:"CHO 培養の代謝物/栄養解析に関する業界ガイダンス。乳酸・アンモニア・浸透圧の影響。",sources:[]},
  {id:"src_add_cho_ipsc_gfi2025",label:"GFI 2025 Cultivated meat techno-economics report",type:"source",domain:"d7",content:"哺乳類細胞培養における乳酸・浸透圧の阻害メカニズムと閾値範囲。CHO 培養知見を含む。",sources:[]},
  {id:"src_add_cho_ipsc_seo2021",label:"Seo et al. 2021 Vertical-Wheel iPSC aggregate DoE",type:"source",domain:"d4",content:"Vertical-Wheel での iPSC 凝集体安定性 DoE。OCT4/SOX2/NANOG の個別最適化と多能性維持。",sources:[]},
  {id:"src_add_cho_ipsc_stemcellpis",label:"STEMCELL hPSC aggregate culture PIS",type:"source",domain:"d1",content:"hPSC 凝集体培養プロトコル。理想平均凝集体径 50–200 µm。",sources:[]},
  {id:"src_add_cho_ipsc_amsbio",label:"Amsbio stem cell QC guide",type:"source",domain:"d1",content:"幹細胞品質管理ガイド。OCT4/SOX2/NANOG/SSEA/TRA 等の多能性マーカー。",sources:[]},
  {id:"src_add_cho_ipsc_chen2014",label:"Chen et al. 2014 hPSC culture considerations",type:"source",domain:"d1",content:"hPSC 培養の維持・拡大・治療応用における考慮事項。酸素拡散限界 100–200 µm。",sources:[]},
  {id:"annex22",label:"PIC/S GMP Annex 22（AI）",type:"concept",domain:"d6",content:"PIC/S・EU GMP の AI/ML 専用アネックス（2025-07-07 草案公開）。クリティカル用途では静的・決定論的 AI/ML モデルのみ許容し、動的学習・確率的出力・生成 AI/LLM を禁止。非クリティカル用途の生成 AI は HITL 下で使用可能。Annex 11 上に位置づけられる。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"},{t:"PIC/S news — Joint stakeholders consultation on Chapter 4 / Annex 11 / Annex 22",u:"https://picscheme.org/en/news/joint-stakeholders-consultation-on-the-revision-of-chapter-4"}]},
  {id:"critical_ai",label:"クリティカル AI",type:"concept",domain:"d6",content:"患者安全・製品品質・データインテグリティに直接影響する GMP 判断を支援・自動化する AI/ML モデル。Annex 22 では静的・決定論的モデルのみ許可され、厳格な検証・監視・説明性が求められる。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"noncritical_ai",label:"非クリティカル AI",type:"concept",domain:"d6",content:"文書作成、トレーニング、スケジューリング、非 GMP 傾向分析など、患者安全・品質・データ完全性に直接影響しない AI。生成 AI/LLM も HITL 下で使用可能。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"static_model",label:"静的 AI モデル",type:"concept",domain:"d6",content:"デプロイ後に新データを取り込んで性能を適応させない凍結モデル。Annex 22 クリティカル用途で要求される。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"deterministic_output",label:"決定論的出力",type:"concept",domain:"d6",content:"同一入力に対し同一出力を返すモデル特性。Annex 22 クリティカル用途で必須。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"dynamic_model",label:"動的 AI モデル",type:"concept",domain:"d6",content:"使用中又は新データを継続的・自動的に学習し性能を適応させるモデル。Annex 22 ではクリティカル GMP 用途で禁止。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"probabilistic_model",label:"確率的 AI モデル",type:"concept",domain:"d6",content:"同一入力でも異なる出力を生じうるモデル。Annex 22 ではクリティカル GMP 用途で禁止。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"generative_ai",label:"生成 AI",type:"concept",domain:"d6",content:"テキスト・画像等を生成する確率的モデル群。クリティカル GMP 用途では禁止され、非クリティカル用途で HITL 下でのみ使用可能。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"hitl",label:"Human-in-the-Loop（HITL）",type:"concept",domain:"d6",content:"AI 出力を適格な人間がレビュー・承認する仕組み。Annex 22 では非クリティカル AI やテスト負荷が軽減されたクリティカル AI で要求される。auto_cell では Human-on-the-loop として実装。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"xai",label:"説明可能 AI（XAI）",type:"concept",domain:"d6",content:"AI 判断の根拠を人間が理解・監査できる技術。Annex 22 では特徴量帰属（feature attribution）の記録を要求。SHAP・LIME・ヒートマップ等が例。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"confidence_score",label:"信頼度スコア",type:"concept",domain:"d6",content:"AI モデルの予測・分類ごとの信頼度を数値化したもの。Annex 22 では低信頼度出力を undecided として人間レビューへルーティングすることを求める。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"feature_attribution",label:"特徴量帰属",type:"concept",domain:"d6",content:"モデル出力に寄与した入力特徴量を特定・記録する技術。XAI の中核。Annex 22 8.Explainability で要求。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"drift_monitoring",label:"ドリフト監視",type:"concept",domain:"d6",content:"AI モデルの性能劣化や入力データ分布の変化を継続的に監視する仕組み。Annex 22 10.Operation で要求。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"test_data_independence",label:"テストデータ独立性",type:"concept",domain:"d6",content:"テスト用データが訓練・検証に使用されないよう技術的・手続き的に保証すること。Annex 22 6.Test Data Independency で要求。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"staff_independence",label:"職員独立性",type:"concept",domain:"d6",content:"テストデータにアクセスした職員が同じモデルの訓練・検証に関与しないこと。不可能な場合は dual control/4-eyes で緩和。Annex 22 6.5 で要求。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"data_segregation",label:"データ分離",type:"concept",domain:"d6",content:"訓練・検証・テスト・運用データを分離し、混同・漏洩を防ぐ技術的管理。Annex 22 の test data independency と運用監視の前提。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"static_deterministic_proof",label:"静的決定論的証明",type:"concept",domain:"d6",content:"AI モデルが静的（凍結パラメータ）かつ決定論的（同一入力→同一出力）であることを、チェックサム・固定シード・再現性テスト・モデルカードで証明する手法。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"esignature",label:"電子署名",type:"concept",domain:"d6",content:"電子的な承認・検証を行う仕組み。R&D 一次では PIN/パスフレーズ+監査ログで済ませ、GMP 移行時に 21 CFR Part 11 / Annex 11 準拠の完全電子署名へ移行。",sources:[{t:"21 CFR Part 11 — Electronic Records; Electronic Signatures",u:"https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11"}]},
  {id:"gamp_ai_lifecycle",label:"GAMP5 AI ライフサイクル",type:"concept",domain:"d6",content:"ISPE GAMP 5 Appendix D11 及び GAMP AI Guide が定める concept / project / operation / retirement の AI 有効化システムライフサイクル。Annex 22 実装の業界標準フレームワーク。",sources:[{t:"ISPE GAMP Guide: Artificial Intelligence (2025)",u:"https://ispe.org/publications/guidance-documents/gamp-guide-artificial-intelligence"}]},
  {id:"src_pics_annex22_draft",label:"PIC/S GMP Annex 22 草案",type:"source",domain:"d6",content:"EudraLex Volume 4, Draft Annex 22: Artificial Intelligence, published 2025-07-07 for PIC/S and EU consultation. 患者安全・品質・データインテグリティに影響するクリティカル AI には静的決定論的モデルのみを許容。",sources:[{t:"EudraLex Volume 4 — Draft Annex 22: Artificial Intelligence (July 2025)",u:"https://health.ec.europa.eu/document/download/5f38a92d-bb8e-4264-8898-ea076e926db6_en?filename=mp_vol4_chap4_annex22_consultation_guideline_en.pdf"}]},
  {id:"src_eu_ai_act",label:"EU AI Act (Regulation 2024/1689)",type:"source",domain:"d6",content:"欧州 AI 規則。製造プロセス制御等の high-risk AI に透明性・文書化・人間監視を要求。Annex 22 と併用される。",sources:[{t:"Regulation (EU) 2024/1689 — Artificial Intelligence Act",u:"https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32024R1689"}]},
  {id:"add_aggimg_aggregate_imaging_survey",label:"浮遊凝集体画像解析調査",type:"concept",domain:"d2",content:"iPSC 浮遊/凝集体の径・形態を at-line/in-line で計測し、label-free DL で品質代理指標を推定する技術群。v1 では at-line 明視野/位相差画像を主軸とし、DHM/FBRM/FlowCam はオプション〜後段。",sources:[{t:"Borys et al. 2021, Stem Cell Res Ther 12:55",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC7805206/"},{t:"Eppendorf App Note 485: hiPSC Aggregate Expansion in Stirred-tank Bioreactors",u:"https://www.eppendorf.com/product-media/doc/en/11804882/Fermentors-Bioreactors_Application-Note_485_SciVario_Human-Induced-Pluripotent-Stem-Cell-hiPSC-Aggregate-Expansion-Stirred-tank-Bioreactors-SciVario-twin-Bioprocess-Controller.pdf"}]},
  {id:"add_aggimg_dhm_ovizio",label:"DHM / Ovizio iLINE-F PRO",type:"system",domain:"d7",content:"差分デジタルホログラフィー（D3HM）による in-line ラベルフリー細胞/凝集体モニタリング。VCD・viability・形態パラメータを連続計測。OPC UA 対応・cGMP 対応。iPSC 凝集体の個別径絶対精度には校正が必要。",sources:[{t:"Ovizio iLINE-F PRO commercial partnership (BioProcess Online)",u:"https://www.bioprocessonline.com/doc/ovizio-imaging-systems-is-entering-into-a-commercial-partnership-with-merck-to-promote-its-iline-f-pro-solution-for-the-cell-gene-therapy-market-0001"}]},
  {id:"add_aggimg_fbrm_cld_detail",label:"FBRM 弦長分布（CLD）解析",type:"concept",domain:"d7",content:"Focused Beam Reflectance Measurement による in-line chord length distribution。0.5–1000 µm のトレンド監視が可能。CLD は真の粒径分布ではなく、凝集体の非球形・透光性により径換算に誤差。画像法で補正が必要。",sources:[{t:"Mettler Toledo ParticleTrack with FBRM technology",u:"https://www.mt.com/my/en/home/products/L1_AutochemProducts/particle-size-analyzers/particletrack-fbrm.html"}]},
  {id:"add_aggimg_flowcam_atline",label:"FlowCam at-line 凝集体画像",type:"system",domain:"d7",content:"フローイメージング顕微鏡による at-line 粒子/凝集体解析。2 µm–1 mm の径・面積・円形度・アスペクト比を画像ベースで出力。高濃度・重なり凝集体では計数漏れあり。日次運用が現実的。",sources:[{t:"FlowCam — What is FlowCam?",u:"https://www.fluidimaging.com/blog/what-is-the-flowcam"}]},
  {id:"add_aggimg_brightfield_atline",label:"明視野/位相差 at-line 凝集体画像",type:"concept",domain:"d7",content:"iPSC 浮遊凝集体で最も普及している at-line 画像計測。サンプリング＋光学顕微鏡＋ImageJ 等で径・形態を手動/半自動計測。Kropp 型バイパス顕微鏡または自動サンプリング＋顕微鏡で自動化可能。",sources:[{t:"Kropp/Lipsitz et al. 2019, Sci Rep — at-line bypass imaging of hiPSC aggregates",u:"https://www.nature.com/articles/s41598-019-48814-w"},{t:"Eppendorf App Note 485: hiPSC Aggregate Expansion in Stirred-tank Bioreactors",u:"https://www.eppendorf.com/product-media/doc/en/11804882/Fermentors-Bioreactors_Application-Note_485_SciVario_Human-Induced-Pluripotent-Stem-Cell-hiPSC-Aggregate-Expansion-Stirred-tank-Bioreactors-SciVario-twin-Bioprocess-Controller.pdf"}]},
  {id:"add_aggimg_aggregate_quality_proxy",label:"凝集体品質代理指標",type:"concept",domain:"d2",content:"凝集体画像特徴量（径分布、円形度、内部輝度勾配、輪郭粗さ等）から OCT4/SOX2/NANOG/SSEA4/TRA-1-60 等の offline 品質マーカーを推定する代理指標。v1 では未導入、v2 以降の DL 化候補。",sources:[{t:"Park et al. 2022, Deep learning predicts kidney organoid differentiation",u:"https://www.krcp-ksn.org/upload/pdf/j-krcp-22-017.pdf"},{t:"Piotrowski et al. 2021, Comput Biol Med 129:104172",u:"https://doi.org/10.1016/j.compbiomed.2020.104172"}]},
  {id:"add_aggimg_dl_morphology_pluripotency",label:"DL 形態から多能性予測",type:"concept",domain:"d2",content:"明視野/位相差画像から CNN/U-Net/DenseNet 等で未分化/自発分化を予測する技術。2D コロニー・organoid で実証多数。iPSC 浮遊凝集体への転移は有望だが、教師データ・細胞株汎化が未解決。",sources:[{t:"Chu et al. 2023, Comput Methods Programs Biomed 229:107264",u:"https://doi.org/10.1016/j.cmpb.2022.107264"},{t:"Waisman et al. 2019, Stem Cell Rep 12:845–859",u:"https://doi.org/10.1016/j.stemcr.2019.02.004"}]},
  {id:"add_aggimg_aggregate_size_pluripotency",label:"凝集体径と多能性維持",type:"concept",domain:"d1",content:"凝集体径が大きくなると拡散制限により内部の酸素/栄養濃度が低下し、未分化性マーカー（OCT4 等）が低下・壊死が増大する。Borys 2021 では >400 µm で壊死リスク。細胞株・培地による変動あり。",sources:[{t:"Borys et al. 2021, Stem Cell Res Ther 12:55",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC7805206/"},{t:"StemCell Technologies, Expansion of hPSCs as Aggregates in Suspension Culture Using mTeSR 3D",u:"https://cdn.stemcell.com/media/files/manual/10000005520-Expansion_of_Human_Pluripotent_Stem_Cells_as_Aggregates_in_Suspension_Culture_Using_mTeSR_3D.pdf"}]},
  {id:"add_aggimg_2d_to_aggregate_transfer",label:"2D 画像解析→凝集体解析転移",type:"concept",domain:"d2",content:"2D confluency は浮遊凝集体に不適用。コロニー形態分類・分化領域検出・増殖曲線予測の技術スタックは転移可能だが、教師ラベルと特徴量を凝集体の径・形態・内部構造に読み替える必要がある。",sources:[{t:"Gursky 2023, How Morphology of hPSCs Determines Clone Selection (IntechOpen)",u:"https://www.intechopen.com/online-first/87934"}]},
  {id:"add_aggimg_human_approval_imaging",label:"画像品質代理指標の Human-on-the-loop",type:"concept",domain:"d6",content:"DL 品質代理指標を BO 目的関数や passage トリガに使う場合、予測不確実性・OOD 検出により低信頼度の場合は研究者承認を必須とする。GAMP5 AI/ML Appendix D11 に準拠したモデル管理が前提。",sources:[{t:"auto_cell A 層要求仕様（Human-on-the-loop）",u:"docs/design/requirements.md"},{t:"ADR-0001: thin LLM orchestrator over deterministic tools + Bayesian optimization",u:"docs/design/adr/0001-control-architecture.md"}]},
  {id:"add_aggimg_src_borys_2021",label:"Borys et al. 2021 (hiPSC Vertical-Wheel)",type:"source",domain:"d4",content:"Vertical-Wheel 撹拌槽での hiPSC 凝集体培養。40–80 rpm で day 5 径 169–275 µm、>400 µm で壊死リスク。PMC7805206。",sources:[{t:"Borys et al. 2021, Stem Cell Res Ther 12:55",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC7805206/"}]},
  {id:"add_aggimg_src_eppendorf_485",label:"Eppendorf App Note 485 (hiPSC stirred-tank)",type:"source",domain:"d7",content:"1 L DASGIP Spinner Vessel での hiPSC 凝集体拡大。day 0–5 で 0.5×10⁶ → 8×10⁶ cells/mL。凝集体径は at-line 明視野画像＋ImageJ で手動測定。",sources:[{t:"Eppendorf App Note 485",u:"https://www.eppendorf.com/product-media/doc/en/11804882/Fermentors-Bioreactors_Application-Note_485_SciVario_Human-Induced-Pluripotent-Stem-Cell-hiPSC-Aggregate-Expansion-Stirred-tank-Bioreactors-SciVario-twin-Bioprocess-Controller.pdf"}]},
  {id:"add_aggimg_src_stemcell_mtesr3d",label:"StemCell mTeSR 3D suspension manual",type:"source",domain:"d1",content:"hPSC 浮遊凝集体培養マニュアル。>400 µm で core が栄養欠乏・分化/細胞死。3–4 日ごとの継代を推奨。",sources:[{t:"StemCell Technologies, Expansion of hPSCs as Aggregates in Suspension Culture Using mTeSR 3D",u:"https://cdn.stemcell.com/media/files/manual/10000005520-Expansion_of_Human_Pluripotent_Stem_Cells_as_Aggregates_in_Suspension_Culture_Using_mTeSR_3D.pdf"}]},
  {id:"add_aggimg_src_kropp_2019",label:"Kropp/Lipsitz et al. 2019 (hiPSC bypass imaging)",type:"source",domain:"d7",content:"hiPSC 撹拌懸濁培養の at-line バイパス顕微鏡画像。凝集体径・形態の自動計測への先行例。DOI 10.1038/s41598-019-48814-w。",sources:[{t:"Kropp/Lipsitz et al. 2019, Sci Rep",u:"https://www.nature.com/articles/s41598-019-48814-w"}]},
  {id:"add_aggimg_src_ovizio_ilinef",label:"Ovizio iLINE-F PRO ベンダ資料",type:"source",domain:"d7",content:"D3HM ベースの in-line ラベルフリー細胞/凝集体モニタリング。VCD・viability・形態パラメータ・OPC UA 対応。",sources:[{t:"Ovizio iLINE-F PRO commercial partnership",u:"https://www.bioprocessonline.com/doc/ovizio-imaging-systems-is-entering-into-a-commercial-partnership-with-merck-to-promote-its-iline-f-pro-solution-for-the-cell-gene-therapy-market-0001"}]},
  {id:"add_aggimg_src_fbrm_g400",label:"Mettler Toledo FBRM 技術資料",type:"source",domain:"d7",content:"FBRM 原理：回転レーザー後方散乱による chord length distribution。iPSC 凝集体では CLD→径換算に注意。",sources:[{t:"ParticleTrack with FBRM technology",u:"https://www.mt.com/my/en/home/products/L1_AutochemProducts/particle-size-analyzers/particletrack-fbrm.html"}]},
  {id:"add_aggimg_src_flowcam",label:"FlowCam 技術資料",type:"source",domain:"d7",content:"フローイメージング顕微鏡。2 µm–1 mm の粒子/凝集体画像解析。高濃度・重なり時は計数漏れ。",sources:[{t:"FlowCam — What is FlowCam?",u:"https://www.fluidimaging.com/blog/what-is-the-flowcam"}]},

/* ===================== RENDER ===================== */
const cssv = k => getComputedStyle(document.documentElement).getPropertyValue(k).trim();
const domColor = {}; DOMAINS.forEach(d=>domColor[d.id]=cssv(d.color));
domColor['root']='#E8ECF2';
const colorOf = n => n.type==='source' ? '#C5CDDC' : (n.domain?domColor[n.domain]:domColor['root']);
const TYPE_LABEL = {root:'ルート',domain:'ドメイン',concept:'概念',system:'システム',player:'プレイヤー',source:'情報源'};

const byId = {}; NODES.forEach(n=>byId[n.id]=n);
const adj = {}; NODES.forEach(n=>adj[n.id]=new Set());
EDGES.forEach(e=>{adj[e.s].add(e.t);adj[e.t].add(e.s);});

document.getElementById('nNodes').textContent=NODES.length;
document.getElementById('nEdges').textContent=EDGES.length;

// legend
const legEl=document.getElementById('legend');
const domCount={}; NODES.forEach(n=>{const k=n.type==='source'?'src':n.domain;domCount[k]=(domCount[k]||0)+1;});
let soloDomain=null;
DOMAINS.forEach(d=>{
  const row=document.createElement('div');row.className='leg';row.dataset.dom=d.id;
  row.innerHTML=`<span class="dot" style="background:${domColor[d.id]}"></span><span class="legtitle">${d.label}</span><span class="cnt">${domCount[d.id]||0}</span>`;
  row.addEventListener('click',()=>toggleSolo(d.id,row));
  legEl.appendChild(row);
});
// source legend
const srow=document.createElement('div');srow.className='leg';srow.dataset.dom='__src';
srow.innerHTML=`<span class="dot" style="background:#C5CDDC"></span><span class="legtitle">情報源ノード</span><span class="cnt">${domCount['src']||0}</span>`;
srow.addEventListener('click',()=>toggleSolo('__src',srow));
legEl.appendChild(srow);

function toggleSolo(dom,row){
  if(soloDomain===dom){soloDomain=null;}else{soloDomain=dom;}
  document.querySelectorAll('.leg').forEach(r=>{
    r.classList.toggle('solo',r.dataset.dom===soloDomain);
    r.classList.toggle('off',soloDomain&&r.dataset.dom!==soloDomain);
  });
  applySolo();
}

const svg=d3.select('#graph');
const stage=document.getElementById('stage');
let W=stage.clientWidth,H=stage.clientHeight;
svg.attr('viewBox',`0 0 ${W} ${H}`);
const g=svg.append('g');

const zoom=d3.zoom().scaleExtent([0.3,3]).on('zoom',ev=>g.attr('transform',ev.transform));
svg.call(zoom);

const linkSel=g.append('g').selectAll('line').data(EDGES).join('line')
  .attr('class','link').attr('stroke-width',d=>d.rel==='contains'||d.rel==='has'?1:1.3);

const nodeSel=g.append('g').selectAll('g').data(NODES).join('g').attr('class','node')
  .call(d3.drag().on('start',dstart).on('drag',ddrag).on('end',dend))
  .on('click',(ev,d)=>{ev.stopPropagation();openDetail(d);})
  .on('mouseenter',(ev,d)=>focusNeighbors(d.id))
  .on('mouseleave',()=>{ if(!detailOpenId) clearFocus(); });

const radius = d => d.type==='root'?20 : d.type==='domain'?14 : d.type==='source'?7.5 : 9;

nodeSel.append('circle').attr('class','core')
  .attr('r',radius)
  .attr('fill',d=>d3.color(colorOf(d)).copy({opacity:0.16}))
  .attr('stroke',d=>colorOf(d))
  .attr('stroke-dasharray',d=>d.type==='source'?'2 2':null);

// inner dot (phase-contrast nucleus feel)
nodeSel.append('circle').attr('r',d=>Math.max(2,radius(d)*0.32))
  .attr('fill',d=>colorOf(d)).attr('opacity',.9);

nodeSel.append('text')
  .attr('x',d=>radius(d)+6).attr('y',4)
  .attr('font-size',d=>d.type==='root'?13:d.type==='domain'?11.5:10)
  .attr('font-weight',d=>d.type==='root'||d.type==='domain'?600:400)
  .attr('fill',d=>d.type==='domain'||d.type==='root'?colorOf(d):'#E8ECF2')
  .text(d=>d.label);

// BUGFIX: d3.forceLink resolves links via `source`/`target`, but EDGES use
// `s`/`t`. Without this alias forceLink throws "missing: undefined" on init and
// nothing renders. Keep s/t intact (adj/distance/detail/export still read them).
EDGES.forEach(e=>{e.source=e.s;e.target=e.t;});

const sim=d3.forceSimulation(NODES)
  .force('link',d3.forceLink(EDGES).id(d=>d.id)
     .distance(d=>{const a=byId[d.s.id||d.s],b=byId[d.t.id||d.t];
       if(a.type==='root')return 120; if(a.type==='domain'&&(d.rel==='has'))return 64; return 92;})
     .strength(d=>d.rel==='has'||d.rel==='contains'?0.7:0.12))
  .force('charge',d3.forceManyBody().strength(d=>d.type==='root'?-900:d.type==='domain'?-560:-230))
  .force('center',d3.forceCenter(W/2,H/2))
  .force('collide',d3.forceCollide().radius(d=>radius(d)+18))
  .on('tick',tick);

function tick(){
  linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
}
function dstart(ev,d){if(!ev.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}
function ddrag(ev,d){d.fx=ev.x;d.fy=ev.y;}
function dend(ev,d){if(!ev.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}

// focus / dim
function focusNeighbors(id){
  const keep=new Set([id,...adj[id]]);
  nodeSel.style('opacity',d=>keep.has(d.id)?1:0.12);
  linkSel.style('opacity',d=>(d.source.id===id||d.target.id===id)?0.9:0.04)
         .style('stroke',d=>(d.source.id===id||d.target.id===id)?colorOf(byId[id]):'#3A465F');
}
function clearFocus(){
  if(soloDomain){applySolo();return;}
  nodeSel.style('opacity',1);
  linkSel.style('opacity',null).style('stroke','#3A465F');
}
function applySolo(){
  if(!soloDomain){clearFocus();return;}
  const inDom=d=> soloDomain==='__src'? d.type==='source' : (d.domain===soloDomain||d.id===soloDomain||d.id==='root');
  nodeSel.style('opacity',d=>inDom(d)?1:0.08);
  linkSel.style('opacity',d=>(inDom(d.source)&&inDom(d.target))?0.6:0.03);
}

// search
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){clearFocus();return;}
  const hit=new Set(NODES.filter(n=>n.label.toLowerCase().includes(q)||n.content.toLowerCase().includes(q)).map(n=>n.id));
  nodeSel.style('opacity',d=>hit.has(d.id)?1:0.1);
  nodeSel.select('circle.core').attr('stroke-width',d=>hit.has(d.id)?2.6:1.4);
  linkSel.style('opacity',0.05);
});

/* ---- detail panel ---- */
const detail=document.getElementById('detail');
let detailOpenId=null;
function openDetail(d){
  detailOpenId=d.id;
  document.getElementById('dtType').innerHTML=`<span class="dot" style="background:${colorOf(d)}"></span>${TYPE_LABEL[d.type]||d.type}`;
  document.getElementById('dtName').textContent=d.label;
  document.getElementById('dtDom').textContent=d.domain?('ドメイン: '+ (DOMAINS.find(x=>x.id===d.domain)?.label||'')):(d.type==='root'?'全体ルート':'横断');
  document.getElementById('dtContent').textContent=d.content;
  // sources
  const sc=document.getElementById('dtSrcs');sc.innerHTML='';
  (d.sources||[]).forEach(s=>{
    const a=document.createElement('a');a.className='src';a.href=s.u;a.target='_blank';a.rel='noopener';
    a.innerHTML=`<div class="t">${s.t}</div><div class="u">${s.u}</div>`;sc.appendChild(a);
  });
  document.getElementById('dtSrcSec').style.display=(d.sources&&d.sources.length)?'':'none';
  // relations
  const rc=document.getElementById('dtRels');rc.innerHTML='';
  const outs=EDGES.filter(e=>(e.s.id||e.s)===d.id);
  const ins=EDGES.filter(e=>(e.t.id||e.t)===d.id);
  outs.forEach(e=>addRel(rc,e.rel,byId[e.t.id||e.t],'out'));
  ins.forEach(e=>addRel(rc,e.rel,byId[e.s.id||e.s],'in'));
  detail.classList.add('open');detail.setAttribute('aria-hidden','false');
  focusNeighbors(d.id);
}
function addRel(parent,verb,node,dir){
  const r=document.createElement('div');r.className='rel '+(dir==='in'?'arrowin':'');
  const arrow=dir==='out'?'→':'←';
  r.innerHTML=`<span class="verb">${arrow} ${verb}</span><span class="tgt">${node.label}</span>`;
  r.addEventListener('click',()=>openDetail(node));
  parent.appendChild(r);
}
function closeDetail(){detail.classList.remove('open');detail.setAttribute('aria-hidden','true');detailOpenId=null;clearFocus();}
document.getElementById('dtClose').addEventListener('click',closeDetail);
svg.on('click',closeDetail);

  domains:DOMAINS.map(d=>({id:d.id,label:d.label})),
  nodes:NODES.map(n=>({id:n.id,label:n.label,type:n.type,domain:n.domain,content:n.content,sources:n.sources})),
  edges:EDGES.map(e=>({source:e.s.id||e.s,target:e.t.id||e.t,rel:e.rel}))};
const modal=document.getElementById('modal');
document.getElementById('exportBtn').addEventListener('click',()=>{
  document.getElementById('jsonOut').value=JSON.stringify(exportData,null,2);
  document.getElementById('modalCount').textContent=`${NODES.length} nodes · ${EDGES.length} edges`;
  modal.classList.add('open');
});
document.getElementById('modalClose').addEventListener('click',()=>modal.classList.remove('open'));
document.getElementById('copyBtn').addEventListener('click',()=>{
  const ta=document.getElementById('jsonOut');ta.select();
  navigator.clipboard?.writeText(ta.value).then(()=>{document.getElementById('copyBtn').textContent='COPIED';
    setTimeout(()=>document.getElementById('copyBtn').textContent='COPY',1400);}).catch(()=>{document.execCommand('copy');});
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  soloDomain=null;document.querySelectorAll('.leg').forEach(r=>r.classList.remove('solo','off'));
  document.getElementById('search').value='';
  nodeSel.select('circle.core').attr('stroke-width',1.4);
  svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity);
  clearFocus();
});

// mobile menu
document.getElementById('menuToggle').addEventListener('click',()=>document.getElementById('rail').classList.toggle('open'));

// resize
window.addEventListener('resize',()=>{
  W=stage.clientWidth;H=stage.clientHeight;svg.attr('viewBox',`0 0 ${W} ${H}`);
  sim.force('center',d3.forceCenter(W/2,H/2)).alpha(.2).restart();
});
// initial settle zoom
setTimeout(()=>{ const t=d3.zoomIdentity.translate(W*0.02,0).scale(0.82); svg.transition().duration(700).call(zoom.transform,t); },400);
</script>
</body>
</html>
