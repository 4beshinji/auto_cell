<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPS自動培養ソフトウェア｜ドメイン知識マップ v2.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root{
    --bg:#0F1422; --panel:#151C2D; --panel2:#1B2438; --line:#28324A;
    --ink:#E8ECF2; --mut:#8A94A8; --mut2:#5E687E;
    --d1:#E2728A; --d2:#54C5D9; --d3:#E0A24E; --d4:#9B86E0;
    --d5:#3FB58F; --d6:#C9B85A; --d7:#9FD356; --d8:#D96EB0;
    --src:#C5CDDC;
    --mono: ui-monospace,"SF Mono","JetBrains Mono","Roboto Mono",Menlo,Consolas,monospace;
    --sans: "Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    overflow:hidden;-webkit-font-smoothing:antialiased;
  }
  .wrap{display:grid;grid-template-columns:300px 1fr;height:100vh}

  /* ---- left rail ---- */
  .rail{background:linear-gradient(180deg,#131A29,#0F1422);border-right:1px solid var(--line);
    padding:18px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
  .brand{font-family:var(--mono);font-size:11px;letter-spacing:.22em;color:var(--mut);text-transform:uppercase}
  h1{font-size:18px;line-height:1.35;margin:6px 0 2px;font-weight:600;letter-spacing:.01em}
  h1 .em{color:var(--d2)}
  .sub{font-size:11.5px;color:var(--mut);line-height:1.6}
  .field{position:relative}
  .field input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:7px;padding:9px 10px 9px 30px;font-size:13px;font-family:var(--sans);outline:none}
  .field input:focus{border-color:var(--d2);box-shadow:0 0 0 2px rgba(84,197,217,.18)}
  .field svg{position:absolute;left:9px;top:9px;width:14px;height:14px;stroke:var(--mut2);fill:none}
  .legend{display:flex;flex-direction:column;gap:2px}
  .legend .lh{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--mut2);
    text-transform:uppercase;margin-bottom:6px}
  .leg{display:flex;align-items:center;gap:9px;padding:6px 7px;border-radius:6px;cursor:pointer;
    font-size:12.5px;color:var(--ink);transition:background .12s;border:1px solid transparent;user-select:none}
  .leg:hover{background:var(--panel)}
  .leg.off{opacity:.34}
  .leg.solo{border-color:var(--line);background:var(--panel)}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px rgba(255,255,255,.04)}
  .leg .cnt{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--mut2)}
  .stats{display:flex;gap:14px;font-family:var(--mono);font-size:11px;color:var(--mut);
    border-top:1px solid var(--line);padding-top:12px}
  .stats b{color:var(--ink);font-weight:600}
  .btns{display:flex;gap:8px;margin-top:auto}
  .btn{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;padding:9px;border-radius:7px;cursor:pointer;
    transition:.12s;text-align:center}
  .btn:hover{border-color:var(--d2);color:var(--d2)}
  .hint{font-size:10.5px;color:var(--mut2);line-height:1.6}

  /* ---- canvas ---- */
  .stage{position:relative;overflow:hidden}
  svg.graph{width:100%;height:100%;display:block;cursor:grab}
  svg.graph:active{cursor:grabbing}
  .link{stroke:#3A465F;stroke-opacity:.55}
  .node circle.core{stroke-width:1.4px}
  .node text{font-family:var(--sans);fill:var(--ink);pointer-events:none;
    paint-order:stroke;stroke:rgba(15,20,34,.85);stroke-width:3px;stroke-linejoin:round}
  .node{cursor:pointer}
  .relbadge{font-family:var(--mono);fill:var(--mut2);font-size:8px;letter-spacing:.04em}

  /* ---- detail panel ---- */
  .detail{position:absolute;top:0;right:0;height:100%;width:380px;max-width:88vw;background:var(--panel);
    border-left:1px solid var(--line);transform:translateX(102%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;z-index:20;box-shadow:-24px 0 48px rgba(0,0,0,.35)}
  .detail.open{transform:none}
  .dt-top{padding:18px 20px 14px;border-bottom:1px solid var(--line)}
  .dt-type{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
  .dt-type .dot{width:9px;height:9px}
  .dt-name{font-size:19px;font-weight:600;margin:9px 0 4px;line-height:1.3}
  .dt-dom{font-size:11.5px;color:var(--mut)}
  .dt-body{padding:16px 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:18px}
  .sec h3{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--mut2);margin:0 0 8px;font-weight:600}
  .content{font-size:13.5px;line-height:1.72;color:#D6DCE6}
  .srcs{display:flex;flex-direction:column;gap:8px}
  .src{display:block;text-decoration:none;background:var(--panel2);border:1px solid var(--line);
    border-radius:7px;padding:9px 11px;transition:.12s}
  .src:hover{border-color:var(--src);transform:translateX(2px)}
  .src .t{font-size:12.5px;color:var(--ink);line-height:1.4}
  .src .u{font-family:var(--mono);font-size:10px;color:var(--mut2);margin-top:3px;word-break:break-all}
  .rels{display:flex;flex-direction:column;gap:6px}
  .rel{display:flex;align-items:center;gap:8px;font-size:12.5px;cursor:pointer;padding:5px 7px;
    border-radius:6px;transition:.1s}
  .rel:hover{background:var(--panel2)}
  .rel .verb{font-family:var(--mono);font-size:9.5px;color:var(--mut);background:var(--panel2);
    padding:2px 6px;border-radius:4px;flex:0 0 auto;letter-spacing:.03em}
  .rel .tgt{color:#D6DCE6}
  .rel .arrowin .verb{color:var(--d3)}
  .dt-close{position:absolute;top:14px;right:16px;width:26px;height:26px;border:1px solid var(--line);
    background:var(--panel2);border-radius:6px;color:var(--mut);cursor:pointer;font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center}
  .dt-close:hover{color:var(--ink);border-color:var(--src)}

  /* modal */
  .modal{position:absolute;inset:0;background:rgba(8,11,19,.74);display:none;align-items:center;
    justify-content:center;z-index:40;padding:30px}
  .modal.open{display:flex}
  .mbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;width:640px;max-width:100%;
    max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
  .mhd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .mhd .mt{font-size:14px;font-weight:600}
  .mhd .mc{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--mut)}
  .mbox textarea{flex:1;min-height:320px;background:var(--bg);color:#CBD3E0;border:none;border-bottom:1px solid var(--line);
    font-family:var(--mono);font-size:11px;line-height:1.55;padding:14px 16px;resize:none;outline:none}
  .mft{padding:12px 16px;display:flex;gap:10px;justify-content:flex-end}
  .mft .btn{flex:0 0 auto;padding:9px 16px}
  .legtitle{font-size:12px;color:var(--ink);font-weight:600}

  /* responsive */
  @media (max-width:760px){
    .wrap{grid-template-columns:1fr}
    .rail{position:absolute;z-index:30;width:280px;height:100%;transform:translateX(-101%);transition:transform .24s}
    .rail.open{transform:none}
    .menutoggle{display:flex}
  }
  .menutoggle{display:none;position:absolute;top:12px;left:12px;z-index:25;width:38px;height:38px;
    background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink);
    align-items:center;justify-content:center;cursor:pointer}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  :focus-visible{outline:2px solid var(--d2);outline-offset:2px}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#2A3654;border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div class="wrap">
  <!-- LEFT RAIL -->
  <aside class="rail" id="rail">
    <div>
      <div class="brand">Knowledge Map · v1</div>
      <h1>iPS自動培養ソフトウェアの<span class="em">ドメイン知識マップ</span></h1>
      <div class="sub">京都大学iPS細胞研究財団と関連研究を起点に、自動化ソフトウェアを実装するために必要なドメイン知識を、ナレッジグラフのシードとして構造化。ノード＝ドメイン/概念/情報源/プレイヤー、エッジ＝型付き関係。</div>
    </div>

    <div class="field">
      <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="ノードを検索（例: ベイズ, GCTP, SiLA）" autocomplete="off">
    </div>

    <div class="legend" id="legend">
      <div class="lh">ドメイン（クリックで分離表示）</div>
    </div>

    <div class="stats">
      <div><b id="nNodes">0</b> nodes</div>
      <div><b id="nEdges">0</b> edges</div>
    </div>

    <div class="hint">ノードをクリック → 内容・情報源・関係を表示。ドラッグで移動、ホイールでズーム。ホバーで近傍にフォーカス。</div>

    <div class="btns">
      <button class="btn" id="exportBtn">EXPORT JSON</button>
      <button class="btn" id="resetBtn">RESET VIEW</button>
    </div>
  </aside>

  <!-- STAGE -->
  <div class="stage" id="stage">
    <button class="menutoggle" id="menuToggle" aria-label="メニュー">☰</button>
    <svg class="graph" id="graph"></svg>

    <!-- DETAIL -->
    <aside class="detail" id="detail" aria-hidden="true">
      <button class="dt-close" id="dtClose" aria-label="閉じる">✕</button>
      <div class="dt-top">
        <div class="dt-type" id="dtType"></div>
        <div class="dt-name" id="dtName"></div>
        <div class="dt-dom" id="dtDom"></div>
      </div>
      <div class="dt-body">
        <div class="sec"><h3>内容 / Content</h3><div class="content" id="dtContent"></div></div>
        <div class="sec" id="dtSrcSec"><h3>情報源 / Sources</h3><div class="srcs" id="dtSrcs"></div></div>
        <div class="sec" id="dtRelSec"><h3>関係 / Relations</h3><div class="rels" id="dtRels"></div></div>
      </div>
    </aside>

    <!-- MODAL -->
    <div class="modal" id="modal">
      <div class="mbox">
        <div class="mhd"><span class="mt">ナレッジグラフ・シード (JSON)</span><span class="mc" id="modalCount"></span></div>
        <textarea id="jsonOut" readonly spellcheck="false"></textarea>
        <div class="mft">
          <button class="btn" id="copyBtn">COPY</button>
          <button class="btn" id="modalClose">CLOSE</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

  {id:"root",label:"iPS自動培養ソフトウェア",type:"root",domain:null,content:"患者血液→iPS樹立→維持/拡大→分化誘導→品質評価までを、画像判断・ロボット操作・規制対応を統合して自動制御するソフトウェアスタック。本マップはその実装に必要なドメイン知識の地図。",sources:[{t:"iPS財団 My iPSプロジェクト（自家細胞を自動作製）",u:"https://www.nikkan.co.jp/articles/view/00745986"},{t:"my iPSプロジェクト（iPS財団 公式）",u:"https://www.cira-foundation.or.jp/j/about/project/myips/"}]},
  {id:"d1",label:"細胞生物学・培養プロトコル",type:"domain",domain:"d1",content:"自動化の対象そのもの。iPS細胞の樹立・維持・継代・分化誘導・量産の生物学的手順群で、各操作のパラメータが下流の制御変数になる。",sources:[{t:"CiRA ヒトiPS細胞 培養プロトコール集",u:"https://www.cira.kyoto-u.ac.jp/j/research/protocol.html"}]},
  {id:"d2",label:"画像取得・コンピュータビジョン",type:"domain",domain:"d2",content:"ラベルフリー画像から細胞状態を定量し、意思決定の入力を生成する層。コンフルエンシー・形態・分化の判定が中核。",sources:[{t:"Deep learning for label-free monitoring of iPSC & organoids",u:"https://www.moleculardevices.com/en/assets/app-note/dd/img/deep-learning-based-image-analysis-for-label-free-live-monitoring-of-ipsc-and-3d-organoid-cultures"}]},
  {id:"d3",label:"ロボティクス・液体ハンドリング",type:"domain",domain:"d3",content:"培養操作を物理的に実行する装置・ロボット層。汎用双腕と閉鎖型専用機の二系統がある。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"},{t:"Long-term iPSC maintenance by automated culture system（Konagaya 2015）",u:"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4647834/"}]},
  {id:"d4",label:"プロセス制御・自律最適化",type:"domain",domain:"d4",content:"観察→判断→操作の閉ループと、プロトコル最適化（ベイズ最適化等）を担う制御知能の層。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"},{t:"ヒューマノイドロボットとAIによる自律細胞培養（理研 2020）",u:"https://www.riken.jp/press/2020/20201204_1/index.html"}]},
  {id:"d5",label:"ソフトウェア基盤・相互運用",type:"domain",domain:"d5",content:"デバイス統合標準・ワークフローオーケストレーション・データ基盤。異種機器を跨ぐ統合の土台。",sources:[{t:"SiLA 2 FAQ（HTTP/2 + Protocol Buffers, OPC-UA比較）",u:"https://sila-standard.com/faq/"},{t:"The SiLA 2 Manager（device discovery / data integrity）",u:"https://www.sciencedirect.com/science/article/pii/S2352711022000103"}]},
  {id:"d6",label:"GMP・規制・データインテグリティ",type:"domain",domain:"d6",content:"製造ソフトが満たすべき規制・品質・電子記録の要件群。設計の制約条件を規定する。",sources:[{t:"GCTP適合性調査（PMDA）",u:"https://www.pmda.go.jp/review-services/gmp-qms-gctp/gctp/0002.html"},{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"d7",label:"センサ・環境モニタリング",type:"domain",domain:"d7",content:"培養環境・無菌性の連続計測と、閉ループ制御への状態量供給。エッジ実装で分散計測。",sources:[{t:"Long-term iPSC maintenance by automated culture system（Konagaya 2015）",u:"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4647834/"}]},
  {id:"d8",label:"エコシステム・プレイヤー",type:"domain",domain:"d8",content:"財団・企業・装置など実在の担い手と製品。技術選定とパートナリングの地図。",sources:[{t:"iPS財団 My iPSプロジェクト（自家細胞を自動作製）",u:"https://www.nikkan.co.jp/articles/view/00745986"},{t:"Terumo BCT × CiRA Foundation 自動化提携（Quantum Flex）",u:"https://www.terumo.com/newsrelease/detail/20240319/6146"}]},
  {id:"maint",label:"iPSC維持培養",type:"concept",domain:"d1",content:"未分化状態を保つ日々の培地交換と環境維持。ヒトiPSは毎日の培地交換と約3日ごとの継代が必要で、熟練手技に依存する点が自動化の主対象。",sources:[{t:"CiRA ヒトiPS細胞 培養プロトコール集",u:"https://www.cira.kyoto-u.ac.jp/j/research/protocol.html"},{t:"Long-term iPSC maintenance by automated culture system（Konagaya 2015）",u:"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4647834/"}]},
  {id:"passage",label:"継代（剥離・分散）",type:"concept",domain:"d1",content:"コロニーを剥離し新プレートへ植え継ぐ工程。単一細胞分散かクランプ維持か、ROCK阻害剤(Y-27632)添加、シェアストレス管理が品質を左右する。",sources:[{t:"CiRA ヒトiPS細胞 培養プロトコール集",u:"https://www.cira.kyoto-u.ac.jp/j/research/protocol.html"},{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"}]},
  {id:"feeder",label:"フィーダーフリー培養",type:"concept",domain:"d1",content:"フィーダー細胞を用いず基質コート上で培養する方式。臨床・自動化に適し、画像解析でも背景が単純化しやすい。",sources:[{t:"CiRA ヒトiPS細胞 培養プロトコール集",u:"https://www.cira.kyoto-u.ac.jp/j/research/protocol.html"}]},
  {id:"diff",label:"分化誘導プロトコル",type:"concept",domain:"d1",content:"目的細胞へ誘導する多段階手順。iPSC→RPEは seeding / preconditioning / passage / induction / maintenance の5段階として定式化され、自動探索のテンプレになった。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"}]},
  {id:"signal",label:"シグナル制御（添加因子）",type:"concept",domain:"d1",content:"分化方向を決める阻害剤の濃度・タイミング。RPE誘導では FGFR阻害剤・SB431542(TGFβ)・CKI-7(Wnt)・Y-27632 等が制御変数。これらが最適化の探索空間になる。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"}]},
  {id:"suspension",label:"浮遊・懸濁培養（量産）",type:"concept",domain:"d1",content:"3次元浮遊撹拌で容積当たり密度を上げ量産する方式。突発的分化を化合物で抑制し、樹立→大量培養→直接凍結まで一貫化。自動化・スケールアップの基盤形態。",sources:[{t:"iPS細胞を浮遊培養で樹立・大量培養（理研, eLife）",u:"https://www.riken.jp/press/2024/20241120_1/index.html"},{t:"iPS樹立から大量培養まで一貫（CiRA財団共著, eLife）",u:"https://stemcells.or.jp/ips-9/"}]},
  {id:"reprog",label:"iPSC樹立（初期化）",type:"concept",domain:"d1",content:"体細胞をRNA等で初期化しコロニーを得る最難関工程。形態が動的で良質コロニー選抜が職人技。財団・パナソニックが2026年に樹立工程の自動化実証に着手。",sources:[{t:"パナソニックHD iPS樹立工程の自動化 実証実験（2026/4）",u:"https://prtimes.jp/main/html/rd/p/000006702.000003442.html"},{t:"ML label-free iPSC colony formation detection（Sci Rep）",u:"https://www.nature.com/articles/s41598-017-13680-x"}]},
  {id:"qccrit",label:"細胞品質基準",type:"concept",domain:"d1",content:"未分化マーカー発現・三胚葉分化能・核型など、製造物が満たすべき生物学的基準。自動判定の「正解ラベル」を定義し、画像代理指標と紐づける必要がある。",sources:[{t:"Parametric analysis of hPSC colony morphology for QC（Sci Rep）",u:"https://www.nature.com/articles/srep34009"},{t:"Long-term iPSC maintenance by automated culture system（Konagaya 2015）",u:"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4647834/"}]},
  {id:"bf",label:"明視野/位相差イメージング",type:"concept",domain:"d2",content:"低光毒性で非侵襲なラベルフリー観察。一方で低コントラスト・不均一背景・ハロー/エッジ効果があり、頑健なセグメンテーションが難所。",sources:[{t:"Deep learning for label-free monitoring of iPSC & organoids",u:"https://www.moleculardevices.com/en/assets/app-note/dd/img/deep-learning-based-image-analysis-for-label-free-live-monitoring-of-ipsc-and-3d-organoid-cultures"}]},
  {id:"conf",label:"コンフルエンシー算出",type:"concept",domain:"d2",content:"セグメンテーションで占有面積/コロニー面積を定量。継代や次工程移行の判断指標（例: 70-80%）として閾値化される中核メトリクス。",sources:[{t:"Automation of iPSC culture/passaging with CellXpress.ai（Molecular Devices）",u:"https://www.moleculardevices.com/en/assets/app-note/dd/3d-biology/automation-of-ipsc-culture-passaging-and-expansion-with-cellxpress-ai-automated-cell-culture-system"},{t:"Deep learning for label-free monitoring of iPSC & organoids",u:"https://www.moleculardevices.com/en/assets/app-note/dd/img/deep-learning-based-image-analysis-for-label-free-live-monitoring-of-ipsc-and-3d-organoid-cultures"}]},
  {id:"morphcls",label:"コロニー形態分類",type:"concept",domain:"d2",content:"良/不良フェノタイプをCNN等で識別。形態パラメータが未分化性・クローン性維持能と相関し、選抜・除外の自動判断に使う。",sources:[{t:"QC of hPSC colonies by CNN image analysis",u:"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9820636/"},{t:"Parametric analysis of hPSC colony morphology for QC（Sci Rep）",u:"https://www.nature.com/articles/srep34009"}]},
  {id:"diffdet",label:"分化領域検出",type:"concept",domain:"d2",content:"未分化コロニー内の自発分化領域を検出・定量。分化率の閾値超過ウェルを除外したり、誘導の進行度評価に用いる専用DLモデル。",sources:[{t:"Automation of iPSC culture/passaging with CellXpress.ai（Molecular Devices）",u:"https://www.moleculardevices.com/en/assets/app-note/dd/3d-biology/automation-of-ipsc-culture-passaging-and-expansion-with-cellxpress-ai-automated-cell-culture-system"},{t:"Deep learning for label-free monitoring of iPSC & organoids",u:"https://www.moleculardevices.com/en/assets/app-note/dd/img/deep-learning-based-image-analysis-for-label-free-live-monitoring-of-ipsc-and-3d-organoid-cultures"}]},
  {id:"growth",label:"増殖曲線予測→継代トリガ",type:"concept",domain:"d2",content:"定期観察から面積値の増殖曲線を推定し、目標密度到達の至適時刻を予測。これがスケジューラと継代操作のトリガになる閉ループの起点。",sources:[{t:"ヒューマノイドロボットとAIによる自律細胞培養（理研 2020）",u:"https://www.riken.jp/press/2020/20201204_1/index.html"},{t:"Automation of iPSC culture/passaging with CellXpress.ai（Molecular Devices）",u:"https://www.moleculardevices.com/en/assets/app-note/dd/3d-biology/automation-of-ipsc-culture-passaging-and-expansion-with-cellxpress-ai-automated-cell-culture-system"}]},
  {id:"dlmodel",label:"DLモデル（分割/分類）",type:"concept",domain:"d2",content:"セグメンテーション(面積/コンフルエンシー)と分類(形態・分化)の学習モデル群。ラベルフリー前提・低コントラスト対応・施設間汎化が実装課題。",sources:[{t:"Deep learning for label-free monitoring of iPSC & organoids",u:"https://www.moleculardevices.com/en/assets/app-note/dd/img/deep-learning-based-image-analysis-for-label-free-live-monitoring-of-ipsc-and-3d-organoid-cultures"},{t:"QC of hPSC colonies by CNN image analysis",u:"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9820636/"}]},
  {id:"dualarm",label:"双腕ヒューマノイド",type:"concept",domain:"d3",content:"汎用器具をそのまま扱える人型双腕（例: LabDroid Maholo）。プロトコル変更に柔軟で、パラメータ探索や手作業の写像に向く。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"},{t:"ヒューマノイドロボットとAIによる自律細胞培養（理研 2020）",u:"https://www.riken.jp/press/2020/20201204_1/index.html"}]},
  {id:"closeddev",label:"閉鎖型専用培養装置",type:"concept",domain:"d3",content:"装置内で取り出さず培養するクローズド機。無菌性・更衣簡略化・人為ミス低減に優れ、財団のmy iPS製造の中核アーキテクチャ。",sources:[{t:"iPS財団 My iPSプロジェクト（自家細胞を自動作製）",u:"https://www.nikkan.co.jp/articles/view/00745986"},{t:"Long-term iPSC maintenance by automated culture system（Konagaya 2015）",u:"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4647834/"}]},
  {id:"dispense",label:"自動分注・ピペッティング",type:"concept",domain:"d3",content:"培地・試薬の精密分注と吸引。液面追従・体積制御・無菌チップ運用が再現性を決める。リキッドハンドラ統合の基本ユニット。",sources:[{t:"Long-term iPSC maintenance by automated culture system（Konagaya 2015）",u:"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4647834/"}]},
  {id:"transport",label:"プレート搬送・把持",type:"concept",domain:"d3",content:"インキュベータ⇄顕微鏡⇄作業台間のプレート/容器搬送とグリッパ制御。スケジュールに沿う物流が自律運転の連続性を支える。",sources:[{t:"ヒューマノイドロボットとAIによる自律細胞培養（理研 2020）",u:"https://www.riken.jp/press/2020/20201204_1/index.html"},{t:"SiLA2: cell culture autopilot / vendor-agnostic",u:"https://www.researchgate.net/publication/360985834_SiLA_2_The_Next_Generation_Lab_Automation_Standard"}]},
  {id:"motioncap",label:"熟練手技のモーション再現",type:"concept",domain:"d3",content:"熟練者の作業を動作解析し数値化してロボットで再現する思想。「誰でもできるよう数値化して自動化」が財団の自動化方針の核。",sources:[{t:"免疫拒絶のない「my iPS細胞」を全自動で作製へ（Science Portal）",u:"https://scienceportal.jst.go.jp/newsflash/20250403_n01/"},{t:"がん治療に役立つ細胞の分化・培養を自動化（Panasonic）",u:"https://news.panasonic.com/jp/stories/17100"}]},
  {id:"sched",label:"スケジューリング",type:"concept",domain:"d4",content:"12時間ごとの観察など定期タスクと、至適継代時刻のような条件起動タスクを編成。多細胞株・多バッチの並行運転を破綻なく回す制御層。",sources:[{t:"ヒューマノイドロボットとAIによる自律細胞培養（理研 2020）",u:"https://www.riken.jp/press/2020/20201204_1/index.html"}]},
  {id:"loop",label:"クローズドループ判断",type:"concept",domain:"d4",content:"観察→判断→操作のサイクルを人手介入なしで回す。画像メトリクスを意思決定点に変換し、通知か次工程実行かを分岐する制御ロジック。",sources:[{t:"ヒューマノイドロボットとAIによる自律細胞培養（理研 2020）",u:"https://www.riken.jp/press/2020/20201204_1/index.html"},{t:"Automation of iPSC culture/passaging with CellXpress.ai（Molecular Devices）",u:"https://www.moleculardevices.com/en/assets/app-note/dd/3d-biology/automation-of-ipsc-culture-passaging-and-expansion-with-cellxpress-ai-automated-cell-culture-system"}]},
  {id:"bbo",label:"バッチベイズ最適化",type:"concept",domain:"d4",content:"数百万通りの培養条件を、ガウス過程＋バッチ取得関数で効率探索。RPE分化率を反復改善した自律実験の中核解法（GPyOptベース）。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"},{t:"LabDroid_optimizer（GitHub / GPyOpt）",u:"https://github.com/labauto/LabDroid_optimizer"}]},
  {id:"doe",label:"実験計画の定式化",type:"concept",domain:"d4",content:"プロトコルをパラメータ空間に写像し、最適化問題として定義する工程。各操作を変数化（濃度・日数・剥離強度等）し探索可能にする前処理。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"}]},
  {id:"sdl",label:"自律実験 / Self-driving Lab",type:"concept",domain:"d4",content:"ロボットが自ら結果を評価し次実験を計画する枠組み。再現性ある細胞製造に向け、探索空間の系統的・無バイアス探索を加速する。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"},{t:"Implementing robotics and AI（eLife digest）",u:"https://elifesciences.org/articles/80609"}]},
  {id:"rl",label:"強化学習（発展領域）",type:"concept",domain:"d4",content:"方策学習による操作・条件最適化。製造GMP文脈では検証可能性が壁で、現状は画像判断・BOが主流、RLは研究段階。",sources:[{t:"Implementing robotics and AI（eLife digest）",u:"https://elifesciences.org/articles/80609"}]},
  {id:"sila",label:"SiLA 2（デバイス標準）",type:"concept",domain:"d5",content:"HTTP/2＋Protocol BuffersとFeature Definition Languageで意味的に同一なデバイスIFを標準化。ベンダロックイン回避と統合工数削減の中核。",sources:[{t:"SiLA 2 FAQ（HTTP/2 + Protocol Buffers, OPC-UA比較）",u:"https://sila-standard.com/faq/"},{t:"Tecan SiLA2 SDK（royalty-free, open-source）",u:"https://slas-technology.org/article/S2472-6303(23)00044-4/fulltext"}]},
  {id:"opcua",label:"OPC-UA / LADS",type:"concept",domain:"d5",content:"産業で普及するM2M標準OPC-UAと、その研究室向けコンパニオン規格LADS。SiLA2と並ぶデバイス通信の選択肢で、製造ライン連携に強い。【P3】LADS v1.0.0(2024年1月, OPC Foundation+Spectaris+VDMA)はバイオリアクタを明示的にモデル化—Functional Unit×Function(analogセンサ/controller/program)構成で、auto_cellのchannel_config/tool_schemas/EBRに直接対応。Eppendorf DASware等プロセス制御機はOPC公開。A層バイオリアクタ制御のデバイスIF第一候補。",sources:[{t:"Tecan SiLA2 SDK（royalty-free, open-source）",u:"https://slas-technology.org/article/S2472-6303(23)00044-4/fulltext"}]},
  {id:"mtp",label:"MTP（モジュール型パッケージ）",type:"concept",domain:"d5",content:"モジュール式・柔軟自動化を可能にする記述。SiLA2と組み合わせ、R&Dから製造へのスケールを支える構成管理の枠組み。",sources:[{t:"SiLA 2 FAQ（HTTP/2 + Protocol Buffers, OPC-UA比較）",u:"https://sila-standard.com/faq/"}]},
  {id:"orch",label:"ワークフロー・オーケストレーション",type:"concept",domain:"d5",content:"タスクとデータと物理ハードを途切れなく統合する制御フレーム（AlabOS, Helao 等）。各機器をサービス化し横断ワークフローを管理。",sources:[{t:"SiLA2: cell culture autopilot / vendor-agnostic",u:"https://www.researchgate.net/publication/360985834_SiLA_2_The_Next_Generation_Lab_Automation_Standard"}]},
  {id:"gateway",label:"レガシーデバイス・ゲートウェイ",type:"concept",domain:"d5",content:"独自IFしか持たない既存機器を標準IFへ橋渡しするゲートウェイ層。GPIO/USB/シリアル接続と遠隔監視で「スマート化」する。",sources:[{t:"The SiLA 2 Manager（device discovery / data integrity）",u:"https://www.sciencedirect.com/science/article/pii/S2352711022000103"}]},
  {id:"lims",label:"LIMS / LES（情報・実行系）",type:"concept",domain:"d5",content:"検体・試薬・手順・結果を記録/指図する上位システム。デバイス層からのデータを集約し、バッチ記録・トレーサビリティに接続する。",sources:[{t:"The SiLA 2 Manager（device discovery / data integrity）",u:"https://www.sciencedirect.com/science/article/pii/S2352711022000103"},{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"datamodel",label:"データモデル / インジェスト",type:"concept",domain:"d5",content:"画像・センサ・操作ログの標準化された取り込み。新旧機器の異種IFを跨いだ「データ取り込みギャップ」の解消が自律運転の前提。",sources:[{t:"SiLA2: cell culture autopilot / vendor-agnostic",u:"https://www.researchgate.net/publication/360985834_SiLA_2_The_Next_Generation_Lab_Automation_Standard"},{t:"The SiLA 2 Manager（device discovery / data integrity）",u:"https://www.sciencedirect.com/science/article/pii/S2352711022000103"}]},
  {id:"gctp",label:"GCTP（再生医療等製品製造管理）",type:"concept",domain:"d6",content:"再生医療等製品の製造・品質管理基準。製造設備に加え管理手法の適合性をPMDAが調査。製造ソフトの設計境界を規定する。",sources:[{t:"GCTP適合性調査（PMDA）",u:"https://www.pmda.go.jp/review-services/gmp-qms-gctp/gctp/0002.html"}]},
  {id:"ramlaw",label:"再生医療等安全性確保法 / 施設基準",type:"concept",domain:"d6",content:"細胞培養加工施設の構造設備基準と適合性調査の根拠法。my iPS製造施設はこの枠組みでPMDA適合性調査を受け稼働を目指す。",sources:[{t:"再生医療等安全性確保法 関連（Science Portal）",u:"https://scienceportal.jst.go.jp/newsflash/20250403_n01/"},{t:"免疫拒絶のない「my iPS細胞」を全自動で作製へ（Science Portal）",u:"https://scienceportal.jst.go.jp/newsflash/20250403_n01/"}]},
  {id:"alcoa",label:"ALCOA+ データインテグリティ",type:"concept",domain:"d6",content:"帰属性・判読性・同時性・原本性・正確性＋αを全ライフサイクルで満たす原則。製造/解析で生成する全データが従うべき設計要件。",sources:[{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"csv",label:"CSV / CSA（システムバリデーション）",type:"concept",domain:"d6",content:"計算機システムが目的適合かつALCOA+準拠であることを文書化した証拠。技術的統制で担保するのは複雑で時間を要するが必須工程。",sources:[{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"part11",label:"21 CFR Part 11 / Annex 11",type:"concept",domain:"d6",content:"電子記録・電子署名の監査性と安全な取扱いを求めるFDA/EU規制。電子系の設計（権限・署名・改ざん防止）の直接要件。",sources:[{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"ebr",label:"電子バッチ記録（EBR）",type:"concept",domain:"d6",content:"製造工程で生成される改ざん不能な電子記録。前工程データの検証で次工程の整合を担保し、逸脱時の是正を可能にする。",sources:[{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"audit",label:"監査証跡（Audit Trail）",type:"concept",domain:"d6",content:"誰が・いつ・何を変更したかを追える記録。データインテグリティとPart11準拠の中核で、全操作のロギング設計が必要。",sources:[{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"capa",label:"CAPA / リスク管理（FMEA）",type:"concept",domain:"d6",content:"逸脱・品質事象の根本原因分析と是正/予防措置。FMEA等のリスク評価が製品・工程設計の判断を導く。ソフトの逸脱検知設計に直結。",sources:[{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"envmon",label:"環境モニタリング（DO/pH/CO₂/温度）",type:"concept",domain:"d7",content:"培養環境の連続計測。維持培養や量産の安定性を支え、閉ループ制御の状態量を供給する。エッジ実装（ESP32等）で分散計測が可能。",sources:[{t:"Long-term iPSC maintenance by automated culture system（Konagaya 2015）",u:"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4647834/"}]},
  {id:"sterility",label:"無菌性・コンタミ監視",type:"concept",domain:"d7",content:"菌混入や逸脱の検知。閉鎖系では更衣簡略化と引換えに監視設計が重要で、9日連続運転でも重大エラー/汚染ゼロが品質目標水準。",sources:[{t:"ヒューマノイドロボットとAIによる自律細胞培養（理研 2020）",u:"https://www.riken.jp/press/2020/20201204_1/index.html"},{t:"免疫拒絶のない「my iPS細胞」を全自動で作製へ（Science Portal）",u:"https://scienceportal.jst.go.jp/newsflash/20250403_n01/"}]},
  {id:"cpv",label:"インライン/アットライン分析（CPV）",type:"concept",domain:"d7",content:"工程内・近接でのリアルタイム計測で工程性能を継続検証(CPV)。AI/自動化が高スループットQCと工程安定性監視を可能にする。【P5】具体スタック(2026-06-15調査): VCD=in-line capacitance(Aber FUTURA/Hamilton Incyte, Manstein iPSCで定性検証), 代謝物=in-line Raman(CHOで閉ループglucose制御実証)＋at-line Nova BioProfile FLEX2(16項＋osmolality/viability), 凝集体径=in-line DHM(Ovizio)/FBRM(CLD≠径) or at-line画像(Kropp2019/FlowCam, 日次)。品質(未分化/同一性)・無菌はoffline=BO目的関数専用。",sources:[{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"},{t:"Krause et al. 2023, Curr Opin Biotechnol — biocapacitance online biomass",u:"https://www.sciencedirect.com/science/article/pii/S0958166923000897"},{t:"Graf/Wei et al. 2022, Front Bioeng — in-line Raman closed-loop glucose (PID)",u:"https://www.frontiersin.org/journals/bioengineering-and-biotechnology/articles/10.3389/fbioe.2022.719614/full"},{t:"Nova Biomedical BioProfile FLEX2 (16-parameter at-line analyzer)",u:"https://www.novabiomedical.com/cell-culture-analyzers/bioprofile-flex2-basic/"},{t:"Kropp et al. 2019, Sci Rep — at-line bypass imaging of hiPSC aggregates",u:"https://www.nature.com/articles/s41598-019-48814-w"}]},
  {id:"edge",label:"エッジセンサ統合",type:"concept",domain:"d7",content:"マイコン/IoTによる多点センサ取得とデバイス層への配信。標準IF（SiLA2/OPC-UA）やゲートウェイ経由で上位へ集約する接点。",sources:[{t:"The SiLA 2 Manager（device discovery / data integrity）",u:"https://www.sciencedirect.com/science/article/pii/S2352711022000103"}]},
  {id:"cira",label:"CiRA財団 / my iPS",type:"player",domain:"d8",content:"自家iPSの閉鎖系フル自動製造を推進。約3週間・原材料費約100万円/人を掲げ、PMDA適合性調査・非臨床を経て2028年度の治験開始を目標。",sources:[{t:"iPS財団 My iPSプロジェクト（自家細胞を自動作製）",u:"https://www.nikkan.co.jp/articles/view/00745986"},{t:"免疫拒絶のない「my iPS細胞」を全自動で作製へ（Science Portal）",u:"https://scienceportal.jst.go.jp/newsflash/20250403_n01/"},{t:"my iPSプロジェクト（iPS財団 公式）",u:"https://www.cira-foundation.or.jp/j/about/project/myips/"}]},
  {id:"terumo",label:"Terumo BCT / Quantum Flex",type:"system",domain:"d8",content:"2024年に財団と提携。Quantum Flex Cell Expansion System上で閉鎖・自動・統合プロセスを構築し、デジタル技術で効率と制御を高める。【P3】Quantum FlexはCPAソフト(プロトコルビルダ/最大100台フリート/cGMP)の閉鎖ターンキーで、公開デバイスAPIは確認できず＝自前ブレインの閉ループ制御対象ではなく商用/臨床エンドポイント(連携するなら監視のみ)。",sources:[{t:"Terumo BCT × CiRA Foundation 自動化提携（Quantum Flex）",u:"https://www.terumo.com/newsrelease/detail/20240319/6146"}]},
  {id:"pana",label:"パナソニックHD",type:"player",domain:"d8",content:"岩田研由来の閉鎖型自動培養の系譜。2026年4月、中之島クロスでiPS樹立工程の自動化実証を開始し、最難関の樹立に踏み込む。",sources:[{t:"パナソニックHD iPS樹立工程の自動化 実証実験（2026/4）",u:"https://prtimes.jp/main/html/rd/p/000006702.000003442.html"},{t:"がん治療に役立つ細胞の分化・培養を自動化（Panasonic）",u:"https://news.panasonic.com/jp/stories/17100"}]},
  {id:"kaneka",label:"カネカ × 理研（林洋平ら）",type:"player",domain:"d8",content:"財団研究開発センターと共同で、樹立から大量培養までを一貫させた浮遊培養をeLifeに報告。量産・自動化の基盤形態を提供。",sources:[{t:"iPS細胞を浮遊培養で樹立・大量培養（理研, eLife）",u:"https://www.riken.jp/press/2024/20241120_1/index.html"},{t:"iPS樹立から大量培養まで一貫（CiRA財団共著, eLife）",u:"https://stemcells.or.jp/ips-9/"}]},
  {id:"rbi",label:"Robotic Biology Institute / Maholo",type:"system",domain:"d8",content:"双腕ヒューマノイドLabDroid Maholoの提供元。汎用器具操作と高再現性で、自律探索プラットフォームの物理基盤を担う。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"}]},
  {id:"epistra",label:"Epistra（自律最適化）",type:"player",domain:"d8",content:"Maholo×AIの自律実験を支えた企業の一つ。実験計画・ベイズ最適化など最適化エンジン側で関与。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"}]},
  {id:"moldev",label:"Molecular Devices / CellXpress.ai",type:"system",domain:"d8",content:"イメージングベースのAI判断で給餌・継代を自動化する商用システム。DLで形態/分化を識別し、24/365運転で複数株を拡大。",sources:[{t:"Automation of iPSC culture/passaging with CellXpress.ai（Molecular Devices）",u:"https://www.moleculardevices.com/en/assets/app-note/dd/3d-biology/automation-of-ipsc-culture-passaging-and-expansion-with-cellxpress-ai-automated-cell-culture-system"},{t:"Deep learning for label-free monitoring of iPSC & organoids",u:"https://www.moleculardevices.com/en/assets/app-note/dd/img/deep-learning-based-image-analysis-for-label-free-live-monitoring-of-ipsc-and-3d-organoid-cultures"}]},
  {id:"astellas",label:"アステラス製薬（双腕ロボ）",type:"player",domain:"d8",content:"双腕ロボットでiPS培養を自動化し、治験用供給を企図。製薬側からの製造自動化プレイヤー。",sources:[{t:"iPS細胞をロボが培養（アステラス, 日経）",u:"https://www.nikkei.com/article/DGKKZO75692350Z21C23A0TB0000/"}]},
  {id:"src_kanda",label:"Kanda et al. 2022 (eLife)",type:"source",domain:"d4",content:"自律ロボット×バッチベイズ最適化でiPSC-RPE分化を最適化した記念碑的論文。プロトコルの5段階定式化とパラメータ探索、コード公開を含む。",sources:[{t:"Robotic search for optimal cell culture（Kanda et al., eLife 2022）",u:"https://elifesciences.org/articles/77007"},{t:"LabDroid_optimizer（GitHub / GPyOpt）",u:"https://github.com/labauto/LabDroid_optimizer"}]},
  {id:"src_riken2020",label:"理研 自律培養 2020",type:"source",domain:"d2",content:"人型ロボット×AIで12h観察→増殖予測→至適継代を9日間自律実行。閉ループ自律培養の国内先行実証。",sources:[{t:"ヒューマノイドロボットとAIによる自律細胞培養（理研 2020）",u:"https://www.riken.jp/press/2020/20201204_1/index.html"}]},
  {id:"src_sila",label:"SiLA 2 標準群",type:"source",domain:"d5",content:"デバイス相互運用の標準。Tecan SDK・SiLA2 Manager・cell culture autopilot事例まで、実装に直接使える資源群。",sources:[{t:"Tecan SiLA2 SDK（royalty-free, open-source）",u:"https://slas-technology.org/article/S2472-6303(23)00044-4/fulltext"},{t:"The SiLA 2 Manager（device discovery / data integrity）",u:"https://www.sciencedirect.com/science/article/pii/S2352711022000103"},{t:"SiLA2: cell culture autopilot / vendor-agnostic",u:"https://www.researchgate.net/publication/360985834_SiLA_2_The_Next_Generation_Lab_Automation_Standard"},{t:"SiLA 2 FAQ（HTTP/2 + Protocol Buffers）",u:"https://sila-standard.com/faq/"}]},
  {id:"src_gctp",label:"PMDA GCTP / 適合性調査",type:"source",domain:"d6",content:"再生医療等製品の製造・品質管理の適合性を定める一次情報。製造ソフトの規制要件の出発点。",sources:[{t:"GCTP適合性調査（PMDA）",u:"https://www.pmda.go.jp/review-services/gmp-qms-gctp/gctp/0002.html"}]},
  {id:"src_cgt",label:"CGT QC/QA（ALCOA・Part11）",type:"source",domain:"d6",content:"データインテグリティ・CSV・CAPA・CPVを横断する実務解説。電子系設計の要件マップとして有用。",sources:[{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"src_cxa",label:"CellXpress.ai 適用ノート",type:"source",domain:"d2",content:"コンフルエンシー/分化のDL2モデルと閾値起動の自動継代を具体記述。画像→意思決定の設計参照。",sources:[{t:"Automation of iPSC culture/passaging with CellXpress.ai（Molecular Devices）",u:"https://www.moleculardevices.com/en/assets/app-note/dd/3d-biology/automation-of-ipsc-culture-passaging-and-expansion-with-cellxpress-ai-automated-cell-culture-system"},{t:"Deep learning for label-free monitoring of iPSC & organoids",u:"https://www.moleculardevices.com/en/assets/app-note/dd/img/deep-learning-based-image-analysis-for-label-free-live-monitoring-of-ipsc-and-3d-organoid-cultures"}]},
  {id:"src_susp",label:"浮遊培養 一貫化（eLife）",type:"source",domain:"d1",content:"樹立→大量培養→直接凍結まで浮遊系で一貫。量産・自動化の生物学的基盤。財団・理研・カネカ共同。",sources:[{t:"iPS細胞を浮遊培養で樹立・大量培養（理研, eLife）",u:"https://www.riken.jp/press/2024/20241120_1/index.html"},{t:"iPS樹立から大量培養まで一貫（CiRA財団共著, eLife）",u:"https://stemcells.or.jp/ips-9/"}]},
  {id:"kinetics",label:"浮遊培養速度論モデル（Tier2 plant 原典）",type:"concept",domain:"d1",content:"iPSC浮遊培養の比増殖速度をMonod型で表すin silicoモデル。auto_cell Tier2 plant_modelの原典はManstein & Zweigerdt 2021（SCTM/STAR Protocols, src_manstein）で、グルコース・乳酸・グルタミン・浸透圧・凝集体径の阻害項を持ち、灌流で7日35×10⁶ cells/mLを達成した過程制御モデル。Table1定数(µ=1.35/d, KGlc=1.5mM, KLac=50mM, KGln=0.01mM, KOsm=500mOsm/kg, KAgg=350/2=175µm径)はplant_modelと完全一致。Galvanauskas 2019(src_galv)は3項のみの近縁別モデル。",sources:[{t:"Kinetic modeling of hiPSC expansion in suspension culture（Galvanauskas et al., Regen Therapy 2019;12:88-93）",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC6933447/"}]},
  {id:"src_galv",label:"Galvanauskas et al. 2019 (近縁の3項モデル)",type:"source",domain:"d1",content:"iPSC浮遊培養速度論の近縁モデル(Galvanauskas/Kino-Oka 2019, Regen Therapy 12:88-93)。グルコースMonod＋乳酸阻害＋凝集体体積阻害の3項のみで、グルタミン制限/浸透圧項は持たない(明示的に省略)。定数もplant_modelと異なる(µmax≈2.35/d, KG≈7mM, KAgg=5.6e6µm³体積)。deep-researchが一旦原典と誤推定したが、真の原典はManstein 2021(src_manstein)。",sources:[{t:"Kinetic modeling of hiPSC expansion in suspension culture（PMC6933447）",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC6933447/"},{t:"PubMed 31890771",u:"https://pubmed.ncbi.nlm.nih.gov/31890771/"}]},
  {id:"src_borys",label:"Borys et al. 2021 (Stem Cell Res Ther)",type:"source",domain:"d4",content:"iPSC Vertical-Wheel(PBS Biotech)撹拌最適化。40rpmが最大増殖(day6で32.3±3.2倍)、day5凝集体径169-275µm、>400µmで壊死予想。撹拌CPPの文献アンカー(最適40-60rpm、auto_cellの50-120rpm上限は高め)。",sources:[{t:"Borys et al. 2021, Stem Cell Res Ther 12:55（PMC7805206）",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC7805206/"}]},
  {id:"src_kropp",label:"Kropp/Lipsitz et al. 2015 (BMC Proceedings)",type:"source",domain:"d4",content:"hPSC撹拌懸濁のBox-Behnken DoE。pH7.3/37℃、毎日給餌で高密度、播種2×10⁵が最適、DOは本研究で非有意。注: HES2(ESC)・Micro-24振盪式(400rpm=振盪周波数)でiPSC/インペラ槽への転用に注意。",sources:[{t:"Kropp et al. 2015, BMC Proceedings（PMC4685349）",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC4685349/"}]},
  {id:"src_traj",label:"Nogueira 2019 / Olmer 2012（到達密度 実測）",type:"source",domain:"d1",content:"バッチ vs 灌流の到達密度差。標準バッチはNogueira(Vertical-Wheel)=peak 2.3×10⁶、Olmer(撹拌槽)=2.4×10⁶ cells/mL止まり。plant_modelの検証目標35×10⁶はManstein 2021の灌流プロセス(src_manstein)で達成される値で、バッチでは到達しない。",sources:[{t:"Nogueira et al. 2019, J Biol Eng（PMC6744632）",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC6744632/"},{t:"Olmer et al. 2012, Tissue Eng Part C（PMC3460618）",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC3460618/"}]},
  {id:"src_manstein",label:"Manstein & Zweigerdt 2021（plant_model 原典）",type:"source",domain:"d4",content:"auto_cell Tier2 plant_modelの真の原典。hPSC灌流撹拌槽培養をpH7.1/DO40%/浸透圧ピーク抑制/灌流で制御し、7日で70倍・35×10⁶ cells/mL(150mLで52.5億細胞)を達成。Monod型in silicoモデル(Table1: µ=1.35/d, KGlc=1.5mM, KLac=50mM, KGln=0.01mM, KOsm=500mOsm/kg, KAgg=350/2=175µm)はplant_modelの6定数と完全一致。撹拌80rpm(150mLスケール)。",sources:[{t:"Manstein et al. 2021, Stem Cells Transl Med 10(7):1063-1080（DOI 10.1002/sctm.20-0453, PMID 33660952）",u:"https://pubmed.ncbi.nlm.nih.gov/33660952/"},{t:"Manstein et al. 2021, STAR Protocols 2(4):100988 — in silico model Table 1（PMC8666714）",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC8666714/"}]},
  {id:"src_lads",label:"OPC UA LADS v1.0.0 (OPC Foundation)",type:"source",domain:"d5",content:"Laboratory and Analytical Device Standard。OPC-UAコンパニオン規格(2024-01, OPC Foundation+Spectaris+VDMA, OPC 30500-1)。Functional Unit/Function(sensor analog/discrete/multi-state, controller, actuator)＋Program/Result管理＋Asset/保守。バイオリアクタを明示例として槽=Functional Unit(温度センサ+モータ+program)でモデル化。auto_cellのDomainVertical面に直対応。",sources:[{t:"OPC UA for LADS Part 1 Basics (OPC 30500-1) — reference.opcfoundation.org",u:"https://reference.opcfoundation.org/LADS/v100/docs/"},{t:"OPC UA LADS (SLAS standards)",u:"https://www.slas.org/resources/standards/opc-ua-lads/"},{t:"OPC UA for Laboratory & Analytical Device Standard (LADS) Part 1: Basics (OPC 30500-1)",u:"https://reference.opcfoundation.org/specs/OPC-30500-1/4.1"}]},
  {id:"ctrl_split",label:"制御権限の二層分界",type:"concept",domain:"d4",content:"協業前提でデバイスを設計指定するとき、安全クリティカルな高速ループはデバイス局所コントローラ(検証済PID: 温度37℃/pH7.1/DO40%/撹拌rpm, 秒オーダ・決定的)に置き、ReActブレインは監督制御(設定点変更・灌流/給餌率・サンプリング/継代トリガ・アラーム応答, 30秒+オーダ)に限定する。LLMは高速ループを閉じない(安全/CSV)。緊急停止・無菌バリア・ハード保安連動は安全系のみが強制し、ブレインは読み取りのみ。",sources:[{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"devprofile",label:"デバイスプロファイル / ICD（協業の成果物）",type:"concept",domain:"d5",content:"協業でデバイス側に実装を指定する単一の情報モデル(Interface Control Document)。LADS/OPC-UAのFunctional Unit/Function/Programで表現し、これがdevice実装とauto_cellのDomainVertical(channel↔sensor Function, tool↔controller Function/method, EBR↔Program/Result, event↔alarm)を束ねる。setpoint範囲・単位・検証済包絡線を含み、second-source(別ベンダ実装)を可能にする。bespoke REST/gRPCを一次契約にしない。",sources:[{t:"OPC UA for LADS Part 1 Basics (OPC 30500-1) — reference.opcfoundation.org",u:"https://reference.opcfoundation.org/LADS/v100/docs/"}]},
  {id:"recipe_executor",label:"L1 決定的レシピ実行器",type:"concept",domain:"d4",content:"ADR-0001 で採用された L1 層。レシピ DSL とルールエンジンに基づき、灌流/給餌/撹拌/サンプリング/継代要否を状態とレシピから決定的に実行する。LLM は per-cycle には入らない。",sources:[]},
  {id:"recipe_dsl",label:"レシピ DSL",type:"concept",domain:"d4",content:"培養フェーズ・条件起動ロジック・setpoint 包絡線を宣言的に記述する軽量ドメイン特化言語（YAML/JSON 想定）。Manstein 型灌流 0→7 vvd の条件起動を記述可能。",sources:[]},
  {id:"rule_engine",label:"ルールエンジン",type:"concept",domain:"d4",content:"イベント（glucose_low/lactate_high/osmolality_high/vcd_target_reached/contamination_suspected 等）からアクションへの決定的マッピングを実行するエンジン。",sources:[]},
  {id:"state_machine_l1",label:"L1 状態機械",type:"concept",domain:"d4",content:"L1 レシピ実行器内のフェーズ遷移（seed → perfusion_ramp → passage_ready → hold 等）を明確に管理する状態機械。",sources:[]},
  {id:"l0_local_pid",label:"L0 局所 PID",type:"concept",domain:"d4",content:"バイオリアクター本体の局所コントローラ。温度/pH/DO/撹拌の高速安全ループを秒オーダで決定的に制御する。",sources:[]},
  {id:"l0_fail_safe",label:"L0 フェイルセーフ",type:"concept",domain:"d4",content:"ブレイン/通信断時に局所 PID が最終検証済 setpoint を保持し続ける設計。ブレイン停止時も培養を継続させる。",sources:[]},
  {id:"ax_bayesian",label:"Ax Bayesian optimization",type:"system",domain:"d4",content:"Meta が開発する高レベルベイズ最適化プラットフォーム。制約付き BO、バッチ BO、多忠実度をサポートし、auto_cell L2 の実装候補。",sources:[]},
  {id:"botorch",label:"BoTorch",type:"system",domain:"d4",content:"PyTorch ベースの低レベルベイズ最適化ライブラリ。qEI/qNEHVI、MultiFidelityGP、KnowledgeGradient 等を提供。",sources:[]},
  {id:"multi_fidelity",label:"多忠実度 BO",type:"concept",domain:"d4",content:"Tier2 plant_model（低忠実度・低コスト）と実バイオリアクタ run（高忠実度・高コスト）を統合したベイズ最適化。",sources:[]},
  {id:"safe_bo",label:"Safe BO",type:"concept",domain:"d4",content:"CPP 包絡線（pH/DO/乳酸/浸透圧/凝集体径等）を侵害しないよう制約を課したベイズ最適化。",sources:[]},
  {id:"batch_bo",label:"バッチ BO",type:"concept",domain:"d4",content:"複数バイオリアクタを並行運転するためのバッチ取得関数（qEI/qNEHVI）に基づく実験計画。",sources:[]},
  {id:"llm_orchestrator",label:"L3 薄い LLM オーケストレータ",type:"concept",domain:"d4",content:"ADR-0001 で採用された L3 層。ワークフロー dispatch、曖昧知覚解釈、新規例外処理、研究者対話・承認仲介をイベント駆動で実行。定常制御には関与しない。",sources:[]},
  {id:"human_approval",label:"Human-on-the-loop 承認",type:"concept",domain:"d6",content:"包絡線を外れる setpoint 変更、継代実行、BO 提案採用、緊急停止/ホールド等に対する研究者/オペレータの承認。",sources:[]},
  {id:"approval_workflow",label:"Human-on-the-loop 承認ワークフロー",type:"concept",domain:"d4",content:"requested → pending → approved/rejected/timeout → executed/cancelled の状態遷移。タイムアウト時は安全側に倒す。

[merged from multiple agents]
L1/L2/L3 が自律実行しようとする包絡線外・重大アクションに対し、研究者の明示承認を得てから実行する状態遷移機構。requested → approved/rejected/pending_timeout → executed/cancelled。承認結果は監査証跡に不変ログ化される。",sources:[{t:"auto_cell A 層要求仕様（Human-on-the-loop）",u:"docs/design/requirements.md"},{t:"NIST AI Risk Management Framework（human-in-the-loop 概念）",u:"https://www.nist.gov/itl/ai-risk-management-framework"}]},
  {id:"idempotency",label:"冪等性",type:"concept",domain:"d5",content:"L1→L0 の setpoint 変更を idempotency key 付き request-response とし、ブレイン再起動後も同一コマンドを再発行可能にする性質。",sources:[]},
  {id:"validate_tool_call",label:"ツール呼び出し検証",type:"concept",domain:"d6",content:"副作用ツール呼び出し前に CPP 包絡線・変化率制限・競合を決定的に検証する仕組み。",sources:[]},
  {id:"set_perfusion_rate",label:"set_perfusion_rate",type:"concept",domain:"d4",content:"灌流率（0→7 vvd）を設定する L1 副作用ツール。glucose/lactate/osmolality トリガで条件起動する。",sources:[]},
  {id:"set_agitation_rpm",label:"set_agitation_rpm",type:"concept",domain:"d4",content:"撹拌回転数（50–120 rpm）を設定する L1 副作用ツール。凝集体径制御とシアストレス管理に用いる。",sources:[]},
  {id:"trigger_passage_l1",label:"trigger_passage (L1)",type:"concept",domain:"d4",content:"VCD 目標到達または凝集体径逸脱時に継代を要求する L1 アクション。実行には原則として Human-on-the-loop 承認が必要。",sources:[]},
  {id:"take_sample_l1",label:"take_sample (L1)",type:"concept",domain:"d4",content:"定期または条件起動で at-line サンプリングを行う L1 アクション。cpv へデータを供給する。",sources:[]},
  {id:"src_ax",label:"Ax Adaptive Experimentation Platform",type:"source",domain:"d4",content:"Facebook/Meta の実験最適化プラットフォーム。BoTorch 上に構築され、探索空間・制約・多忠実度の管理に向く。",sources:[]},
  {id:"src_botorch",label:"BoTorch（ベイズ最適化）",type:"source",domain:"d4",content:"PyTorch ベースのベイズ最適化ライブラリ。多忠実度・制約付き BO に強く、L2 層の実装候補。",sources:[]},
  {id:"cpp_ph",label:"CPP: pH",type:"concept",domain:"d7",content:"A-layer pH setpoint 7.1; L0 local PID maintains, L1 may shift within envelope.",sources:[]},
  {id:"cpp_do",label:"CPP: dissolved oxygen",type:"concept",domain:"d7",content:"A-layer DO setpoint 40% -> 10% at high density; L0 local PID with agitation cascade.",sources:[]},
  {id:"cpp_temp",label:"CPP: temperature",type:"concept",domain:"d7",content:"A-layer temperature setpoint 37 C; L0 local PID.",sources:[]},
  {id:"cpp_agitation",label:"CPP: agitation rpm",type:"concept",domain:"d4",content:"A-layer agitation 50-120 rpm; Borys 2021 optimum 40-60 rpm for Vertical-Wheel iPSC.",sources:[]},
  {id:"cpp_glucose",label:"CPP: glucose",type:"concept",domain:"d7",content:"A-layer glucose >1.5 mM; K_Glc=1.5 mM from Manstein 2021 Table 1; perfusion trigger source.",sources:[]},
  {id:"cpp_lactate",label:"CPP: lactate",type:"concept",domain:"d7",content:"A-layer lactate <50 mM; K_Lac=50 mM from Manstein 2021 Table 1; perfusion trigger source.",sources:[]},
  {id:"cpp_glutamine",label:"CPP: glutamine",type:"concept",domain:"d7",content:"A-layer glutamine >0.01 mM; K_Gln=0.01 mM from Manstein 2021 Table 1.",sources:[]},
  {id:"cpp_osmolality",label:"CPP: osmolality",type:"concept",domain:"d7",content:"A-layer osmolality <500 mOsm/kg; K_Osm=500 mOsm/kg from Manstein 2021 Table 1; perfusion trigger source.",sources:[]},
  {id:"cpp_ammonia",label:"CPP: ammonia (monitoring)",type:"concept",domain:"d7",content:"Ammonia monitoring-only CPP for v1; mammalian toxicity threshold 4-6 mM, iPSC-native threshold not yet established.",sources:[]},
  {id:"cpp_aggregate_diameter",label:"CPP: aggregate diameter",type:"concept",domain:"d7",content:"A-layer aggregate diameter 150-350 um; Borys 2021 reports >400 um necrosis risk.",sources:[]},
  {id:"cpp_vcd",label:"CPP: viable cell density",type:"concept",domain:"d7",content:"A-layer VCD target ~35e6 cells/mL; measured by in-line capacitance; triggers passage.",sources:[]},
  {id:"cpp_viability",label:"CPP: viability",type:"concept",domain:"d7",content:"A-layer viability target >90%; primarily BO objective input, not L1 control target.",sources:[]},
  {id:"cpp_perfusion_rate",label:"CPP: perfusion rate",type:"concept",domain:"d4",content:"A-layer main actuator 0->7 vvd (Manstein 2021 Table 3); conditionally triggered by glucose/lactate/osmolality.",sources:[]},
  {id:"ramp_limit",label:"ramp rate limit",type:"concept",domain:"d4",content:"Maximum per-unit-time change for perfusion/agitation/DO setpoints to avoid shear/osmotic shock.",sources:[]},
  {id:"perfusion_trigger",label:"perfusion ramp trigger",type:"concept",domain:"d4",content:"L1 rule event that raises perfusion rate when glucose/lactate/osmolality cross thresholds.",sources:[]},
  {id:"y_27632",label:"Y-27632 ROCK inhibitor",type:"concept",domain:"d1",content:"Standard ROCK inhibitor added during dissociation passage to improve iPSC survival.",sources:[]},
  {id:"tool_set_perfusion_rate",label:"tool: set_perfusion_rate",type:"concept",domain:"d5",content:"LADS controller Function / DomainVertical tool for perfusion rate. Maps to devprofile.",sources:[]},
  {id:"tool_set_agitation_rpm",label:"tool: set_agitation_rpm",type:"concept",domain:"d5",content:"LADS controller Function / DomainVertical tool for agitation setpoint.",sources:[]},
  {id:"tool_trigger_passage",label:"tool: trigger_passage",type:"concept",domain:"d5",content:"LADS Program / DomainVertical tool for dissociation passage with Y-27632.",sources:[]},
  {id:"src_yehya2024",label:"Yehya et al. 2024 (Stem Cell Res Ther)",type:"source",domain:"d4",content:"Vertical-Wheel agitation DoE supporting lower optimum rpm (40-60 rpm).",sources:[]},
  {id:"src_xing2008",label:"Xing et al. 2008 (Biotechnol Prog)",type:"source",domain:"d1",content:"CHO osmolality threshold reference; iPSC-native value not established.",sources:[]},
  {id:"src_nova_flex2",label:"Nova BioProfile FLEX2",type:"source",domain:"d7",content:"16-parameter at-line analyzer for metabolites, osmolality, viability, cell diameter.

[merged from multiple agents]
Nova Biomedical, BioProfile FLEX2 cell culture analyzer.",sources:[]},
  {id:"src_mqtt5",label:"MQTT Version 5.0 | OASIS Standard",type:"source",domain:"d5",content:"MQTT 5.0 標準仕様。Response Topic、Correlation Data、Message Expiry Interval、Reason Code 等により request-response とエラーハンドリングを規定。",sources:[]},
  {id:"lads_functional_unit",label:"LADS Functional Unit",type:"concept",domain:"d5",content:"LADS v1.0.0 で定義される機能単位。バイオリアクタ槽を 1 つの仮想デバイスとして集約し、内部に Sensor/Controller/Actuator Function と ProgramManager を持つ。",sources:[]},
  {id:"lads_sensor_function",label:"LADS Sensor Function",type:"concept",domain:"d5",content:"LADS Functional Unit に属するセンサ機能（analog/discrete/multi-state）。pH/DO/Temp/Agitation/Capacitance/Raman/Pressure/Level/Foam 等が該当。",sources:[]},
  {id:"lads_controller_function",label:"LADS Controller Function",type:"concept",domain:"d5",content:"LADS Functional Unit に属する制御機能。局所 PID（pH/DO/Temp/Agitation）の制御ロジックを内包し、ブレインからの検証済設定点を受け取る。",sources:[]},
  {id:"lads_actuator_function",label:"LADS Actuator Function",type:"concept",domain:"d5",content:"LADS Functional Unit に属する駆動機能。灌流ポンプ、給餌ポンプ、培地交換弁、サンプリング弁等の離散/連続駆動素子を表す。",sources:[]},
  {id:"lads_program_result",label:"LADS Program/Result",type:"concept",domain:"d5",content:"LADS ProgramManager が管理するプログラム（seed/passage/perfusion_ramp/clean）とその実行結果。EBR 導出の原材料となる。",sources:[]},
  {id:"sila_feature",label:"SiLA2 Feature",type:"concept",domain:"d5",content:"SiLA2 Feature Definition Language（FDL）で定義される機能単位。サンプリングロボ、分注、at-line 分析器等のコマンド/property を記述。",sources:[]},
  {id:"mqtt_topic_contract",label:"MQTT topic contract",type:"concept",domain:"d5",content:"auto_cell brain と device_gateway 間の MQTT topic 命名規則。cell/{culture_unit_id}/{direction}/{category}/{device_id}/{function_id} の形式。",sources:[]},
  {id:"gateway_cmd_ack",label:"Gateway command/ack correlation",type:"concept",domain:"d5",content:"MQTT 5.0 Response Topic + Correlation Data を使った非同期 request-response。冪等キーと Message Expiry Interval による重複/stale コマンド防止。",sources:[]},
  {id:"icd_setpoint_envelope",label:"ICD setpoint envelope",type:"concept",domain:"d4",content:"協業 ICD に定義された設定点範囲・単位・変化率制限。validate_tool_call と gateway 側の二重検証に使われる。",sources:[]},
  {id:"peripheral_sampler",label:"SiLA2 サンプリングロボ",type:"system",domain:"d8",content:"SiLA2 で統合される at-line サンプリングロボ。take_sample コマンドを提供。",sources:[]},
  {id:"peripheral_dispenser",label:"SiLA2 自動分注器",type:"system",domain:"d8",content:"SiLA2 で統合される液体分注器。feed/exchange_media 等の培地操作を実行。",sources:[]},
  {id:"peripheral_atline_analyzer",label:"SiLA2 at-line 分析器",type:"system",domain:"d8",content:"SiLA2 で統合される at-line 分析器（例: Nova BioProfile FLEX2）。代謝物パネル・浸透圧・生存率を提供。",sources:[]},
  {id:"src_mqtt5_reqresp",label:"",type:"source",domain:"d5",content:"",sources:[]},
  {id:"src_sila_comm",label:"",type:"source",domain:"d5",content:"",sources:[]},
  {id:"measurement_vcd_capacitance",label:"in-line capacitance VCD",type:"concept",domain:"d7",content:"Aber/Hamilton/Sartorius 等の誘電分光/インピーダンスセンサによる生細胞密度の連続計測。iPSC 高密度では offline VCD・細胞径・生存率を用いた校正が必要。",sources:[]},
  {id:"measurement_raman_inline",label:"in-line Raman 代謝物計測",type:"concept",domain:"d7",content:"in-line Raman 分光による glucose/lactate/glutamine/glutamate の同時推定。CHO で PID 閉ループ実証あり。iPSC では chemometric 再校正が必要。",sources:[]},
  {id:"measurement_atline_nova",label:"at-line Nova FLEX2 マルチパラメータ",type:"concept",domain:"d7",content:"Nova BioProfile FLEX2 による 16 項目（代謝物/ガス/電解質/細胞密度/生存率/細胞径/浸透圧）のアットライン分析。Raman 校正・BO 入力の正解ラベル源。",sources:[]},
  {id:"measurement_aggregate_imaging",label:"at-line 凝集体画像計測",type:"concept",domain:"d7",content:"FlowCam または Kropp 型バイパス顕微鏡による凝集体径・形態の画像解析。v1 では離散/日次運用が現実的。",sources:[]},
  {id:"measurement_fbrm_cld",label:"FBRM 弦長分布計測",type:"concept",domain:"d7",content:"Mettler Toledo ParticleTrack による Focused Beam Reflectance Measurement。連続計測可能だが、CLD は真の粒径分布ではなく凝集体形状に依存。",sources:[]},
  {id:"measurement_ovizio_dhm",label:"Ovizio D3HM ホログラフィ計測",type:"concept",domain:"d7",content:"Ovizio iLINE-F PRO の Double Differential Digital Holographic Microscopy。ラベルフリー連続細胞/凝集体モニタリング。iPSC 実証は限定的。",sources:[]},
  {id:"monitoring_ammonia_atline",label:"at-line アンモニウムモニタリング",type:"concept",domain:"d7",content:"Nova FLEX2 による NH4+ のアットライン計測。CPP ではないが、代謝毒性早期発見のため監視。",sources:[]},
  {id:"monitoring_quality_offline",label:"offline 品質マーカー計測",type:"concept",domain:"d7",content:"未分化/多能性マーカー（OCT4/SOX2/NANOG/SSEA/TRA）、核型/同一性、自発分化等の offline/run 単位計測。BO 目的関数専用。",sources:[]},
  {id:"monitoring_sterility_offline",label:"offline/rapid 無菌性計測",type:"concept",domain:"d7",content:"汚染/無菌性の offline または rapid micro 検査。現時点で検証済み online 手段は未確認。CAPA トリガ源。",sources:[]},
  {id:"instr_aber_futura",label:"Aber FUTURA",type:"system",domain:"d7",content:"Aber Instruments の in-line capacitance biomass センサ。580 kHz 線形モデルで VCD を推定。",sources:[]},
  {id:"instr_hamilton_incytes",label:"Hamilton Incyte Arc",type:"system",domain:"d7",content:"Hamilton の in-line permittivity ベース VCD センサ。RS485 Modbus 出力、哺乳類 5e5–8e9 cells/mL レンジ。",sources:[]},
  {id:"instr_sartorius_viamass",label:"Sartorius BioPAT ViaMass",type:"system",domain:"d7",content:"Sartorius の in-line capacitance biomass センサ。Aber 技術ベース、BioPAT MFCS/DCU 統合。",sources:[]},
  {id:"instr_nova_flex2",label:"Nova BioProfile FLEX2",type:"system",domain:"d7",content:"Nova Biomedical の 16 項目 at-line 細胞培養分析器。275 µL・4.5 分、OLS による自動サンプリング対応。",sources:[]},
  {id:"instr_ovizio_ilinef",label:"Ovizio iLINE-F PRO",type:"system",domain:"d7",content:"Ovizio の D3HM ベース in-line ホログラフィ細胞/凝集体モニタリングシステム。OPC UA 対応。",sources:[]},
  {id:"instr_fbrm_g400",label:"Mettler Toledo ParticleTrack G400",type:"system",domain:"d7",content:"FBRM 技術による in-situ 弦長分布計測器。0.5–2000 µm レンジ。",sources:[]},
  {id:"instr_flowcam",label:"FlowCam",type:"system",domain:"d7",content:"Fluid Imaging Technologies のフローイメージング顕微鏡。2 µm–1 mm の粒子/凝集体画像解析。",sources:[]},
  {id:"src_aber_futura",label:"Aber FUTURA app note",type:"source",domain:"d7",content:"Aber Instruments, FUTURA capacitance perfusion monitoring.",sources:[]},
  {id:"src_hamilton_incytes",label:"Hamilton Incyte Arc specs",type:"source",domain:"d7",content:"Hamilton Company, Incyte Arc Viable Cell Density Sensor specifications.",sources:[]},
  {id:"src_sartorius_viamass",label:"Sartorius BioPAT ViaMass",type:"source",domain:"d7",content:"Sartorius, BioPAT ViaMass inline biomass measurement system.",sources:[]},
  {id:"src_ovizio_ilinef",label:"Ovizio iLINE-F PRO press release",type:"source",domain:"d7",content:"Ovizio Imaging Systems, iLINE-F PRO holographic in-line cell monitoring.",sources:[]},
  {id:"src_fbrm_g400",label:"Mettler Toledo ParticleTrack FBRM",type:"source",domain:"d7",content:"Mettler Toledo, ParticleTrack with FBRM technology.",sources:[]},
  {id:"src_flowcam",label:"FlowCam overview",type:"source",domain:"d7",content:"Fluid Imaging Technologies, FlowCam imaging particle analyzer overview.",sources:[]},
  {id:"src_raman_graf2022",label:"Graf/Wei 2022 in-line Raman PID glucose",type:"source",domain:"d7",content:"Graf/Wei et al. 2022, Frontiers in Bioengineering, in-line Raman closed-loop glucose control.",sources:[]},
  {id:"src_krause2023",label:"Krause 2023 capacitance review",type:"source",domain:"d7",content:"Krause et al. 2023, Curr Opin Biotechnol, biocapacitance online biomass monitoring.",sources:[]},
  {id:"tech_control",label:"技術的統制",type:"concept",domain:"d6",content:"R&D一次でありつつ将来GMP移行を妨げないよう、ソフトウェアに織り込むALCOA+/Part11/CSV/CSA/EBR/CAPAの実装上の統制群。",sources:[{t:"FDA Guidance for Industry: Data Integrity and Compliance With Drug CGMP Questions and Answers (2018)",u:"https://www.fda.gov/regulatory-information/search-fda-guidance-documents/data-integrity-and-compliance-drug-cgmp-questions-and-answers"}]},
  {id:"audit_schema",label:"監査ログスキーマ",type:"concept",domain:"d6",content:"副作用ツール呼び出し、承認状態遷移、センサ取り込み、システム状態変化をALCOA+/Part11準拠で記録するための構造化ログスキーマ。",sources:[{t:"21 CFR Part 11 — Electronic Records; Electronic Signatures",u:"https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11"}]},
  {id:"approval_log",label:"承認記録",type:"concept",domain:"d6",content:"Human-on-the-loopにおけるrequested→approved/rejected/timeout→executed/cancelledの承認状態遷移を記録する監査証跡。",sources:[{t:"21 CFR Part 11 — Electronic Records; Electronic Signatures",u:"https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11"}]},
  {id:"data_lifecycle",label:"データライフサイクル管理",type:"concept",domain:"d6",content:"生データの生成・処理・レビュー・保存・検索・廃棄までのALCOA+/Endurable/Availableを担保するライフサイクル管理。",sources:[{t:"WHO Good Data and Record Management Practice",u:"https://www.who.int/teams/regulation-prequalification/regulation-and-safety/good-data-and-record-management-practice"}]},
  {id:"llm_validation",label:"LLM層検証戦略",type:"concept",domain:"d6",content:"L3薄いLLMオーケストレータの非決定性を抑え、プロンプトバージョニング・出力根拠ログ・性能モニタリングでGAMP5 AI/ML要件に対応する戦略。",sources:[{t:"ISPE GAMP Guide: Artificial Intelligence (2025)",u:"https://ispe.org/publications/guidance-documents/gamp-guide-artificial-intelligence"}]},
  {id:"ebr_derivation",label:"EBR導出ビュー",type:"concept",domain:"d6",content:"1培養ラン=1EBRをevent_storeから導出するためのビュー。R&D一次ではEBR-like実験プロビナンスレポートとして運用。",sources:[{t:"EudraLex Volume 4 Annex 11 — Computerised Systems",u:"https://health.ec.europa.eu/document/download/2c252435-6383-4ced-8206-8fef57024cc1_en"}]},
  {id:"event_store",label:"イベントストア",type:"concept",domain:"d5",content:"時系列のイミュータブルイベントログを格納するデータ基盤。EBR導出、監査証跡、LADS Program/Result対応の基盤。",sources:[{t:"OPC UA for LADS Part 1 Basics (OPC 30500-1)",u:"https://reference.opcfoundation.org/LADS/v100/docs/"}]},
  {id:"src_fda_data_integrity",label:"FDA 2018 Data Integrity Guidance",type:"source",domain:"d6",content:"FDA 'Data Integrity and Compliance With Drug CGMP Questions and Answers' (2018)。ALCOA+原則を医薬品製造のデータインテグリティに適用したガイダンス。",sources:[{t:"FDA Guidance for Industry: Data Integrity and Compliance With Drug CGMP Questions and Answers (2018)",u:"https://www.fda.gov/regulatory-information/search-fda-guidance-documents/data-integrity-and-compliance-drug-cgmp-questions-and-answers"}]},
  {id:"src_part11",label:"21 CFR Part 11",type:"source",domain:"d6",content:"FDA regulation 'Electronic Records; Electronic Signatures'。電子記録・電子署名・監査証跡の技術的要件を定める。",sources:[{t:"21 CFR Part 11 — Electronic Records; Electronic Signatures",u:"https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11"}]},
  {id:"src_fda_csa",label:"FDA CSA Guidance",type:"source",domain:"d6",content:"FDA 'Computer Software Assurance for Production and Quality System Software' (2022 draft / 2025 final)。リスクベースでソフトウェア保証活動を選定する現代的CSV/CSAアプローチ。",sources:[{t:"FDA Guidance: Computer Software Assurance for Production and Quality System Software",u:"https://www.fda.gov/regulatory-information/search-fda-guidance-documents/computer-software-assurance-production-and-quality-system-software"}]},
  {id:"src_gamp5",label:"ISPE GAMP 5 2nd Edition",type:"source",domain:"d6",content:"ISPE GAMP 5 Guide: A Risk-Based Approach to Compliant GxP Computerized Systems, Second Edition (2022)。Cat.1/3/4/5とAI/ML Appendix D11を含む。",sources:[{t:"ISPE GAMP 5 Guide 2nd Edition (2022)",u:"https://ispe.org/publications/guidance-documents/gamp-5-guide-2nd-edition"}]},
  {id:"src_gamp5_ai",label:"ISPE GAMP Guide: Artificial Intelligence",type:"source",domain:"d6",content:"ISPE GAMP Guide: Artificial Intelligence (2025)。AI有効化コンピュータ化システムのライフサイクル全体の検証・データガバナンス・モデルリスク管理を扱う。",sources:[{t:"ISPE GAMP Guide: Artificial Intelligence (2025)",u:"https://ispe.org/publications/guidance-documents/gamp-guide-artificial-intelligence"}]},
  {id:"src_annex11",label:"EudraLex Annex 11",type:"source",domain:"d6",content:"EudraLex Volume 4 Annex 11 — Computerised Systems。EUのGMPデータコンピュータ化システム要件。",sources:[{t:"EudraLex Volume 4 Annex 11 — Computerised Systems",u:"https://health.ec.europa.eu/document/download/2c252435-6383-4ced-8206-8fef57024cc1_en"}]},
  {id:"src_pics041",label:"PIC/S PI 041-1",type:"source",domain:"d6",content:"PIC/S PI 041-1 — Good Practices for Data Management and Integrity in Regulated GMP/GDP Environments (2021)。ALCOA+運用の国際的実務指針。",sources:[{t:"PIC/S PI 041-1 (2021)",u:"https://picscheme.org/en/publications"}]},
  {id:"src_who_gdrp",label:"WHO Good Data and Record Management Practice",type:"source",domain:"d6",content:"WHO Good Data and Record Management Practice。ALCOA+とデータライフサイクルのWHO解釈。",sources:[{t:"WHO Good Data and Record Management Practice",u:"https://www.who.int/teams/regulation-prequalification/regulation-and-safety/good-data-and-record-management-practice"}]},
  {id:"tier2_plant_model",label:"Tier2 plant_model（in-silico 検証リグ）",type:"concept",domain:"d4",content:"auto_cell の Tier2 シミュレーション層。Manstein 2021 の 6 項 Monod 型 ODE を step(actuators)->sensors IF で実装し、L1 制御ループの回帰検証と L2 BO の低忠実度評価に使う。",sources:[]},
  {id:"plant_model_interface",label:"plant_model step IF",type:"concept",domain:"d4",content:"step(actuators)->sensors という決定的インターフェース。アクチュエータ（perfusion_rate_vvd, agitation_rpm, gas setpoints, feed bolus）を受け、センサ軌道（VCD/代謝物/凝集体径）を返す。",sources:[]},
  {id:"plant_model_calibration",label:"plant_model パラメータ同定・不確実性",type:"concept",domain:"d4",content:"文献値を prior とし、実 run データでベイズ推定または最小二乗により校正。パラメタ事後分布・GP バイアス・構造候補モデルで不確実性を表現。",sources:[]},
  {id:"multifidelity_sim",label:"多忠実度シミュレーション接続",type:"concept",domain:"d4",content:"L2 BO への多忠実度接続。Tier2 plant_model を低コスト低忠実度評価、実バイオリアクタ run を高忠実度評価として組み込む。",sources:[]},
  {id:"plant_model_regression",label:"plant_model 回帰テスト",type:"concept",domain:"d4",content:"同一アクチュエータ系列 → 同一センサ軌道の決定性を保証するゴールデンテスト。CSV/CSA 観点から L1 制御ループの検証リグとして運用。",sources:[]},
  {id:"cobrapy_gem",label:"COBRApy + GEM 差替候補",type:"concept",domain:"d4",content:"将来のゲノム規模代謝モデル（COBRApy）への差替候補。培地組成を制約ベースで解き、代謝物収支を予測。",sources:[]},
  {id:"aggregate_formation_model",label:"凝集体形成動力学モデル",type:"concept",domain:"d1",content:"凝集体の形成・合体・破砕を表す動的サブモデル。撹拌速度・細胞密度と凝集体径の関係を追加する拡張。",sources:[]},
  {id:"shear_stress_model",label:"シアストレスモデル",type:"concept",domain:"d4",content:"撹拌速度・粘度・凝集体径から Kolmogorov 長またはエネルギー散逸率を推定し、細胞傷害閾値を設計する拡張。",sources:[]},
  {id:"src_scipy",label:"SciPy（数値積分）",type:"source",domain:"d5",content:"Python の科学技術計算ライブラリ。plant_model の ODE 数値積分（solve_ivp 等）に使用。",sources:[]},
  {id:"src_cobrapy",label:"COBRApy",type:"source",domain:"d5",content:"Python によるゲノム規模代謝モデリングライブラリ。将来の COBRApy+GEM バックエンド差替の基盤。",sources:[]},
  {id:"hmi_dashboard",label:"HMI ダッシュボード",type:"concept",domain:"d4",content:"研究者が培養状態・承認待ち・アラート・BO 提案を一目で把握するメイン画面。CPP 現在値・トレンド・phase・承認キューを表示し、on-the-loop の接点となる。",sources:[{t:"ISA-101 HMI Design Standards（プロセス制御 HMI）",u:"https://www.isa.org/standards-and-publications/isa-standards/isa-101"},{t:"IEC 62366-1 Medical devices — Application of usability engineering",u:"https://www.iso.org/standard/63179.html"}]},
  {id:"alert_matrix",label:"アラート/通知マトリクス",type:"concept",domain:"d4",content:"各イベントの優先度（P0-P3）、抑制窓、通知チャネル、既定動作を定義したマトリクス。contamination_suspected は抑制不可（0 s）、BO 提案は run 単位（86400 s）など。",sources:[{t:"auto_cell A 層要求仕様（NFR-T, NFR-S）",u:"docs/design/requirements.md"},{t:"ISA-101 HMI Design Standards",u:"https://www.isa.org/standards-and-publications/isa-standards/isa-101"}]},
  {id:"escalation_policy",label:"承認エスカレーションポリシー",type:"concept",domain:"d4",content:"承認要求がタイムアウト・却下・実行失敗した場合のエスカレーションルール。安全側へ倒す（キャンセル/ホールド）を基本とし、リトライ上限超過時は人間介入待ち。",sources:[{t:"auto_cell A 層要求仕様（FR-4, NFR-S）",u:"docs/design/requirements.md"}]},
  {id:"contamination_response",label:"汚染疑い応答フロー",type:"concept",domain:"d7",content:"contamination_suspected 検知時の P0 即時対応。ブレインは安全系へのホールド要求を出し、デバイス局所が強制停止。研究者確認・誤検知記録・CAPA 起票の分岐。",sources:[{t:"KG → auto_cell 設計ブリッジ（sterility/capa 節）",u:"docs/design/kg_to_auto_cell.md"},{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"degraded_mode",label:"縮退運転モード",type:"concept",domain:"d4",content:"ブレイン/LLM/通信断時にも L0 局所 PID と L1 最終検証済レシピで培養を継続するモード。再起動耐性・冪等性・安全を担保。",sources:[{t:"ADR-0001（L0-L3 分離、C4 縮退運転）",u:"docs/design/adr/0001-control-architecture.md"},{t:"auto_cell A 層要求仕様（NFR-S, NFR-R）",u:"docs/design/requirements.md"}]},
  {id:"human_on_the_loop",label:"Human-on-the-loop",type:"concept",domain:"d4",content:"監視・判断・包絡線内アクションは自律、包絡線外や重大アクションは人の承認を要する運転形態。auto_cell A 層の自律度。",sources:[{t:"auto_cell A 層要求仕様",u:"docs/design/requirements.md"}]},
  {id:"audit_ui",label:"監査/EBR UI",type:"concept",domain:"d6",content:"event_store から 1 培養ランの操作ログ・イベント・承認履歴を検索/エクスポートするビュー。ALCOA+ と EBR 再構成を支援。",sources:[{t:"KG → auto_cell 設計ブリッジ（ALCOA+/EBR 節）",u:"docs/design/kg_to_auto_cell.md"},{t:"Cell & Gene Therapy QC/QA（ALCOA, Part 11, CAPA）",u:"https://www.cellandgene.com/topic/cell-gene-therapy-qa-qc"}]},
  {id:"approval_request_event",label:"承認要求イベント",type:"concept",domain:"d4",content:"承認ワークフローで発行されるイベント型。request_id、提案アクション、根拠、要求時刻、レビュー、決定、実行結果を含む。event_store に append-only で記録。",sources:[{t:"auto_cell A 層要求仕様（FR-4, FR-9）",u:"docs/design/requirements.md"}]},
  {id:"notification_suppression",label:"通知抑制（suppression_defaults）",type:"concept",domain:"d4",content:"同一イベントの短時間再発を抑制し HMI/push のフラッディングを防ぐ仕組み。contamination_suspected は抑制不可とする。",sources:[{t:"KG → auto_cell 設計ブリッジ（DomainVertical slot 節）",u:"docs/design/kg_to_auto_cell.md"}]},
  {id:"src_nist_ai_rmf",label:"NIST AI Risk Management Framework",type:"source",domain:"d4",content:"NIST が公開する AI リスク管理フレームワーク。Human-on-the-loop / human-in-the-loop による AI システムのガバナンスと監視を含む。",sources:[{t:"NIST AI Risk Management Framework",u:"https://www.nist.gov/itl/ai-risk-management-framework"}]},
  {id:"src_iec62366",label:"IEC 62366-1（医療機器ユーザビリティ）",type:"source",domain:"d4",content:"医療機器のユーザビリティエンジニアリングを規定する国際標準。HMI 設計の人因工学基準。",sources:[{t:"IEC 62366-1:2015+AMD1:2020",u:"https://www.iso.org/standard/63179.html"}]},
  {id:"src_isa101",label:"ISA-101（プロセス制御 HMI 設計）",type:"source",domain:"d4",content:"ISA-101 標準群。プロセス産業向け HMI の視覚設計、アラーム管理、パフォーマンス指向ディスプレイを規定。",sources:[{t:"ISA-101 HMI Design Standards",u:"https://www.isa.org/standards-and-publications/isa-standards/isa-101"}]},
  {id:"mpc",label:"Model Predictive Control",type:"concept",domain:"d4",content:"プロセスモデルを用いて未来の挙動を予測し、制約内で最適な操作変数を逐次計算する制御手法。A 層では灌流率・feed bolus を操作変数とする将来拡張候補。",sources:[{t:"Model Predictive Controller Design for Bioprocesses (Rashedi et al., DYCOPS-2022)",u:"https://skoge.folk.ntnu.no/prost/proceedings/dycops-2022/files/0202.pdf"},{t:"フィジカルAI包括調査レポート §6.1",u:"/home/sin/Downloads/report/report.md"}]},
  {id:"mpc_ipsc_perfusion",label:"iPSC 浮遊灌流 MPC",type:"concept",domain:"d4",content:"iPSC 浮遊凝集体灌流プロセスに特化した MPC。状態 = VCD/viability/glucose/lactate/glutamine/osmolality/aggregate diameter、操作変数 = perfusion rate/feed bolus、制約 = CPP 包絡線・pump ramp・凝集体シア。現時点で直接実証例は限定的。",sources:[{t:"Process development and scale-up of pluripotent stem cell manufacturing (Huang et al. 2020)",u:"https://www.insights.bio/cell-and-gene-therapy-insights/journal/article/1784/"},{t:"Manstein & Zweigerdt 2021, STAR Protocols Table 1",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC8666714/"}]},
  {id:"mpc_lactate_feedback",label:"乳酸フィードバック MPC",type:"concept",domain:"d4",content:"累積乳酸濃度を細胞成長の soft sensor として、培地交換量を入力とする MPC。MSC 培養で実証されており、iPSC 浮遊灌流への転用可能性がある。",sources:[{t:"Van Beylen et al. 2020, Lactate-Based Model Predictive Control Strategy of Cell Growth for Cell Therapy Applications",u:"https://doi.org/10.3390/bioengineering7030078"}]},
  {id:"mpc_model_types",label:"MPC モデルタイプ",type:"concept",domain:"d4",content:"線形 MPC（LMPC）、非線形 MPC（NMPC）、経済 MPC（EMPC）、ハイブリッド MPC（PINN+ODE）、データ駆動 MPC（DARX/サブスペース）の分類。A 層では plant_model（Manstein ODE）起点で NMPC → ハイブリッド MPC へ段階拡大。",sources:[{t:"Model Predictive Controller Design for Bioprocesses (Rashedi et al., DYCOPS-2022)",u:"https://skoge.folk.ntnu.no/prost/proceedings/dycops-2022/files/0202.pdf"},{t:"Van Beylen et al. 2020, Bioengineering",u:"https://doi.org/10.3390/bioengineering7030078"}]},
  {id:"mpc_constraints",label:"MPC 制約集合",type:"concept",domain:"d4",content:"MPC で考慮する制約群：CPP 包絡線（glucose/lactate/osmolality/aggregate diameter）、perfusion rate 範囲（0–7 vvd）、pump ramp 制限、凝集体シア上限、培地コスト。",sources:[{t:"Manstein & Zweigerdt 2021, STAR Protocols Table 1",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC8666714/"},{t:"Process development and scale-up of pluripotent stem cell manufacturing (Huang et al. 2020)",u:"https://www.insights.bio/cell-and-gene-therapy-insights/journal/article/1784/"}]},
  {id:"mpc_prediction_horizon",label:"MPC 予測ホライズン",type:"concept",domain:"d4",content:"MPC が未来のプロセス挙動を予測する時間幅。iPSC 培養ではバッチ尺が数日～数週間のため、時間単位～日単位の予測ホライズンが妥当。CHO fed-batch 例では 30 日が報告されているが、iPSC では未確定。",sources:[{t:"Model Predictive Controller Design for Bioprocesses (Rashedi et al., DYCOPS-2022)",u:"https://skoge.folk.ntnu.no/prost/proceedings/dycops-2022/files/0202.pdf"}]},
  {id:"mpc_control_horizon",label:"MPC 制御ホライズン",type:"concept",domain:"d4",content:"MPC が最適化する未来の操作変数系列の長さ。予測ホライズン以下。iPSC では求解コストと制御性能のトレードオフで選定。CHO 例では 8 日。",sources:[{t:"Model Predictive Controller Design for Bioprocesses (Rashedi et al., DYCOPS-2022)",u:"https://skoge.folk.ntnu.no/prost/proceedings/dycops-2022/files/0202.pdf"}]},
  {id:"mpc_adaptive_update",label:"MPC 適応更新",type:"concept",domain:"d4",content:"オンライン/at-line データを用いて MPC 内部モデルのパラメータを逐次更新する機構。プロセス・モデルミスマッチ、細胞株変動、ドナー変動に対応。",sources:[{t:"Van Beylen et al. 2020, Bioengineering",u:"https://doi.org/10.3390/bioengineering7030078"}]},
  {id:"mpc_fail_safe",label:"MPC フェイルセーフ",type:"concept",domain:"d4",content:"MPC ソルバー非収束・異常予測・制約違反時に、L1 が最後の検証済 setpoint または安全側デフォルト灌流率を保持する機構。",sources:[{t:"ADR-0001 Control architecture",u:"docs/design/adr/0001-control-architecture.md"}]},
  {id:"mpc_human_on_the_loop",label:"MPC Human-on-the-loop",type:"concept",domain:"d6",content:"MPC の提案軌道・包絡線外 setpoint・低信頼度予測に対して研究者が承認/調整/却下する仕組み。Annex 22 対応の決定論的下位制御器としての位置づけと両立。",sources:[{t:"requirements.md FR-4",u:"docs/design/requirements.md"},{t:"PIC/S GMP Annex 22 AI applicability (CiRA/Sugihara PMC11975184)",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC11975184/"}]},
  {id:"mpc_implementation_libraries",label:"MPC 実装ライブラリ群",type:"concept",domain:"d5",content:"A 層 MPC 実装候補ライブラリ：CasADi（記号計算）、do-mpc（プロトタイプ・OPC-UA 接続例あり）、acados（高速組み込み C コード生成）。",sources:[{t:"CasADi",u:"https://web.casadi.org/"},{t:"do-mpc batch reactor example",u:"https://www.do-mpc.com/en/latest/example_gallery/batch_reactor.html"},{t:"acados documentation",u:"https://docs.acados.org/"}]},
  {id:"dynamic_perfusion_ipsc",label:"iPSC 動的灌流戦略",type:"concept",domain:"d1",content:"pH トリガー等で perfusion rate を動的に増加させる iPSC 浮遊培養戦略。Huang et al. 2020 で pH 6.8 トリガー + 30%/日増加により固定灌流比 25% 向上。MPC で多変数化・最適化可能。",sources:[{t:"Process development and scale-up of pluripotent stem cell manufacturing (Huang et al. 2020)",u:"https://www.insights.bio/cell-and-gene-therapy-insights/journal/article/1784/"}]},
  {id:"cpsr_control",label:"Cell-Specific Perfusion Rate 制御",type:"concept",domain:"d4",content:"生存細胞数あたりの灌流率（CSPR）を一定に保つ制御戦略。培地利用効率と安定的基質濃度を両立。high cell density perfusion の標準的アプローチ。",sources:[{t:"Konstantinov et al. 2006, CSPR concept",u:"https://pure.mpg.de/rest/items/item_3395904_4/component/file_3432420/content"}]},
  {id:"mpc_vs_rule_engine",label:"MPC vs ルールエンジン比較",type:"concept",domain:"d4",content:"v1 の L1 決定的ルールと将来 MPC との比較軸：実装コスト、検証性、最適性、柔軟性、Annex 22 対応、Human-on-the-loop。v1 はルール、Phase 2 以降は MPC 拡張。",sources:[{t:"additional_mpc_for_ipsc.md",u:"docs/design/ground_knowledge/additional_mpc_for_ipsc.md"}]},
  {id:"mpc_roadmap_l1",label:"L1 MPC 導入ロードマップ",type:"concept",domain:"d4",content:"Phase 1: ルールベース L1。Phase 2: plant_model ベース MPC シミュレーション・単一操作変数（perfusion rate）。Phase 3: 多変数・適応・経済 MPC の実機適用。",sources:[{t:"additional_mpc_for_ipsc.md",u:"docs/design/ground_knowledge/additional_mpc_for_ipsc.md"}]},
  {id:"src_rashedi2022",label:"Rashedi et al. 2022 (DYCOPS-2022)",type:"source",domain:"d4",content:"Amgen の fed-batch CHO プロセスへの線形 MPC 実機適用。VCD 最大化、30 日予測ホライズン、8 日制御ホライズン、タイトル 2% 向上。",sources:[{t:"Model Predictive Controller Design for Bioprocesses",u:"https://skoge.folk.ntnu.no/prost/proceedings/dycops-2022/files/0202.pdf"}]},
  {id:"src_van_beylen2020",label:"Van Beylen et al. 2020 (Bioengineering)",type:"source",domain:"d4",content:"Lactate-Based Model Predictive Control Strategy of Cell Growth for Cell Therapy Applications. hBM-MSC 培養で累積乳酸を soft sensor とする適応 DARX-MPC。",sources:[{t:"Lactate-Based Model Predictive Control Strategy",u:"https://doi.org/10.3390/bioengineering7030078"}]},
  {id:"src_huang2020",label:"Huang et al. 2020 (Cell Gene Therapy Insights)",type:"source",domain:"d1",content:"PSC 10 L スケールアップ。動的灌流で pH 6.8 トリガー + 30%/日増加、固定灌流比 25% 向上、乳酸 15 mM 未満抑制。",sources:[{t:"Process development and scale-up of pluripotent stem cell manufacturing",u:"https://www.insights.bio/cell-and-gene-therapy-insights/journal/article/1784/"}]},
  {id:"src_do_mpc",label:"do-mpc",type:"source",domain:"d5",content:"CasADi ベースの Python MPC ライブラリ。非線形 MPC、ロバスト MPC、OPC-UA 接続例あり。",sources:[{t:"do-mpc batch reactor example",u:"https://www.do-mpc.com/en/latest/example_gallery/batch_reactor.html"}]},
  {id:"src_acados",label:"acados",type:"source",domain:"d5",content:"高速組み込み非線形 MPC ソルバー。C コード生成、HPIPM QP ソルバー、CasADi 記号モデル入力。",sources:[{t:"acados documentation",u:"https://docs.acados.org/"}]},
  {id:"src_casadi",label:"CasADi",type:"source",domain:"d5",content:"非線形最適化と自動微分のためのオープンソース記号計算フレームワーク。MPC モデリングの基盤。",sources:[{t:"CasADi",u:"https://web.casadi.org/"}]},
  {id:"pinn",label:"Physics-Informed Neural Network (PINN)",type:"concept",domain:"d4",content:"Neural network trained with both data loss and physics loss (ODE/PDE residuals). For iPSC suspension/aggregate bioreactors, PINNs are a future-phase technology; most published examples are CHO/microbial, not directly transferable to iPSC.",sources:[]},
  {id:"digital_twin",label:"Digital Twin (DT)",type:"concept",domain:"d4",content:"Virtual replica of the bioreactor process that predicts concentration/state profiles and supports what-if analysis. Industrial examples (Yokogawa Insilico) are CHO/mAb-centric; iPSC aggregate-specific DTs are not yet established.",sources:[]},
  {id:"hybrid_ode_nn",label:"Hybrid ODE + Neural Network model",type:"concept",domain:"d4",content:"Mechanistic ODE structure (mass balances) with kinetic terms represented or corrected by neural networks. More data-efficient than pure NN and a realistic Phase 2/3 extension of the Manstein ODE plant_model.",sources:[]},
  {id:"pinn_mpc",label:"PINN-based Model Predictive Control",type:"concept",domain:"d4",content:"MPC that uses a PINN as the prediction model instead of a numerical ODE. Demonstrated in microbial/CHO contexts; iPSC applicability is unverified and should remain advisory/Human-on-the-loop.",sources:[]},
  {id:"uncertainty_quantification",label:"Uncertainty Quantification (UQ) for learned models",type:"concept",domain:"d4",content:"Quantification of epistemic and aleatoric uncertainty in PINN/NN/DT predictions, typically expressed as 95% confidence intervals. Required for Human-on-the-loop escalation when model confidence is low.",sources:[]},
  {id:"deep_ensemble",label:"Deep Ensemble UQ",type:"concept",domain:"d4",content:"Multiple independently trained networks whose prediction distribution defines mean and variance. Simplest practical UQ method for hybrid ODE+NN models.",sources:[]},
  {id:"bayesian_pinn",label:"Bayesian PINN (B-PINN)",type:"concept",domain:"d4",content:"Variational inference over PINN weights to produce posterior predictive distributions. Theoretically grounded but computationally expensive and prior-dependent.",sources:[]},
  {id:"efi_pinn",label:"EFI-based UQ for PINN",type:"concept",domain:"d4",content:"Extended Fiducial Inference for PINNs. Avoids subjective priors/dropout rates by solving data-generating equations; shown to achieve ~95% coverage on synthetic PDEs, but unverified on bioreactor time series.",sources:[]},
  {id:"mc_dropout",label:"MC Dropout UQ",type:"concept",domain:"d4",content:"Dropout retained at inference time to approximate Bayesian predictive distributions. Sensitive to dropout-rate choice; intervals can be poorly calibrated.",sources:[]},
  {id:"gp_bias_correction",label:"GP bias correction for plant_model",type:"concept",domain:"d4",content:"Gaussian Process that learns the residual between Manstein ODE predictions and observed run data. Natural Phase 2 extension that integrates with existing BO infrastructure.",sources:[]},
  {id:"multifidelity_pinn",label:"Multi-fidelity PINN/DT integration",type:"concept",domain:"d4",content:"Use of Manstein ODE and Hybrid ODE+NN as low/medium-fidelity surrogates and real bioreactor runs as high-fidelity evaluations within multi-fidelity Bayesian optimization.",sources:[]},
  {id:"digital_twin_calibration",label:"Digital Twin calibration",type:"concept",domain:"d4",content:"Online/offline parameter estimation and model-mismatch correction using real batch data. Required to keep the DT aligned with the physical process.",sources:[]},
  {id:"universal_differential_equation",label:"Universal Differential Equation (UDE)",type:"concept",domain:"d4",content:"Hybrid model where known mechanistic terms remain explicit and unknown terms are learned by a neural network. Bridges Manstein ODE and full PINN approaches.",sources:[]},
  {id:"neural_ode",label:"Neural ODE",type:"concept",domain:"d4",content:"Learned ordinary differential equation dx/dt = f_theta(x). Can be combined with known physics (UDE) for bioreactor dynamics.",sources:[]},
  {id:"kinetic_cell_model",label:"Kinetic Cell Model",type:"concept",domain:"d1",content:"Sub-model describing cell metabolism and growth kinetics. In advanced DTs it combines genome-scale metabolic networks with neural networks.",sources:[]},
  {id:"reactor_model",label:"Reactor Model",type:"concept",domain:"d4",content:"Mass-balance model of batch/fed-batch/perfusion reactor volumes and concentrations due to inlet/outlet streams.",sources:[]},
  {id:"extracellular_reaction_model",label:"Extracellular Reaction Model",type:"concept",domain:"d4",content:"Model of abiotic reactions in culture media, e.g. glutamine degradation.",sources:[]},
  {id:"model_mismatch_correction",label:"Model mismatch correction",type:"concept",domain:"d4",content:"Learned correction that refines low-fidelity digital twin or simulation predictions using real data. Essential for trustworthy multi-fidelity BO.",sources:[]},
  {id:"prediction_confidence_score",label:"Prediction confidence score",type:"concept",domain:"d6",content:"Normalized score derived from model predictive uncertainty (e.g. 95% CI width). Drives Human-on-the-loop escalation for DT/BO/MPC proposals.",sources:[]},
  {id:"data_requirement_pinn",label:"Data requirement for PINN/hybrid models",type:"concept",domain:"d4",content:"Industry rule-of-thumb: hybrid ODE+NN needs ~50-100 batches, pure NN needs 200-500 batches, PINN ~30-80 batches. CHO/microbial-derived figures; iPSC-native requirements are unverified and likely higher.",sources:[]},
  {id:"src_thirugnanasambandam_2025",label:"Thirugnanasambandam et al. 2025 (Comput Chem Eng)",type:"source",domain:"d4",content:"Dual-ANN PINN framework for generic bioreactor modelling; shows extrapolation limits under time-varying controls.",sources:[]},
  {id:"src_yang_2024_pinn",label:"Yang et al. 2024 (Ind Eng Chem Res)",type:"source",domain:"d4",content:"Hybrid PINN model for large-scale pilot CHO fed-batch culture. CHO example, not directly transferable to iPSC.",sources:[]},
  {id:"src_catalao_2025",label:"Catalão et al. 2025 (J Process Control)",type:"source",domain:"d4",content:"Bioprocess MPC with physics-informed neural networks, microbial community PHA production.",sources:[]},
  {id:"src_patel_2024",label:"Patel et al. 2024 (ADCHEM)",type:"source",domain:"d4",content:"MPC using physics-informed neural networks for DAE systems with ResNet + NTK training.",sources:[]},
  {id:"src_shih_2025",label:"Shih, Jiang & Liang 2025 (NeurIPS / arXiv)",type:"source",domain:"d4",content:"Extended Fiducial Inference for rigorous uncertainty quantification in PINNs without subjective priors/dropout rates.",sources:[]},
